<!DOCTYPE html>

  <meta charset="utf-8" />

  <title>Свободный промпт</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
        
        document.body.style.overflow = 'hidden';
        const container = document.querySelector('.container');
        if (container) {
          container.style.overflowY = 'auto';
          container.style.webkitOverflowScrolling = 'touch';
        }
      }
    })();
  </script>

  <!-- ТЕМА из URL -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- ПЛАТФОРМА из URL -->
  <script>
    (function(){
      const KEY = "miniapp_platform_v1";
      function getPlatform(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("platform");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "ios"; }catch(e){ return "ios"; }
      }
      const platform = getPlatform();
      if (platform === 'android') {
        document.documentElement.classList.add('android-mode');
      }
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== ТЕМЫ ===== */
    :root[data-theme="blue"] { 
      --bg-top: #27384b;
      --bg-mid: #1d2b3a;
      --bg-bot: #16212d;
      --accent1: #5aaeff;
      --accent2: #3496ff;
      --text: #f7fbff;
      --subtext: rgba(247, 251, 255, 0.68);
      --card-bg: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.12);
      --input-bg: rgba(255, 255, 255, 0.08);
      --btn-bg: rgba(90, 174, 255, 0.2);
      --star-color: #ffffff;
      --header-text: #f7fbff;
      --caret-color: #ffffff;
    }

  --bg-top: #1b2430;  /* ТОЧНО КАК В МЕНЮ */
  --bg-mid: #141b24;  /* ТОЧНО КАК В МЕНЮ */
  --bg-bot: #0e141c;  /* ТОЧНО КАК В МЕНЮ */
  --accent1: #8bb8ff;
  --accent2: #5a98ff;
  --text: #f7fbff;
  --subtext: rgba(247, 251, 255, 0.68);
  --card-bg: rgba(255, 255, 255, 0.08);
  --card-border: rgba(255, 255, 255, 0.12);
  --input-bg: rgba(255, 255, 255, 0.06);
  --btn-bg: rgba(139, 184, 255, 0.15);
  --star-color: #ffffff;
  --header-text: #f7fbff;
  --caret-color: #ffffff;
}
    
    :root[data-theme="light"] { 
      --bg-top: #e8edf5;
      --bg-mid: #d9e0eb;
      --bg-bot: #cad1de;
      --accent1: #3a8cff;
      --accent2: #1a6cff;
      --text: #2c3e50;
      --subtext: #4a5a6a;
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-border: rgba(0, 0, 0, 0.1);
      --input-bg: rgba(255, 255, 255, 0.95);
      --btn-bg: rgba(58, 140, 255, 0.1);
      --star-color: #2c3e50;
      --header-text: #2c3e50;
      --caret-color: #3a8cff;
    }

    /* ГРАДИЕНТ ФОНА */
    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bot) 100%);
      background-attachment: fixed;
    }

    /* ===== iOS - ВЕРХНЯЯ ПАНЕЛЬ ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border-bottom: none;
      height: 60px;
    }

    .back-btn {
      color: var(--header-text);
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
      color: var(--header-text);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin: 0 12px;
    }

    .spacer { width: 40px; }

    /* КОНТЕЙНЕР */
    .container {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ===== КАРТОЧКА ===== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* БЕГУЩАЯ ЗМЕЙКА */
    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 30px;
      padding: 2px;
      background: linear-gradient(
        90deg,
        #ff0000,
        #ff7f00,
        #ffff00,
        #00ff00,
        #0000ff,
        #4b0082,
        #8f00ff,
        #ff0000
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: snakeMove 3s linear infinite;
      background-size: 300% 100%;
      opacity: 0.7;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes snakeMove {
      0% { background-position: 0% 0; }
      100% { background-position: 300% 0; }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon {
      font-size: 32px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .star-badge {
      font-size: 16px;
      color: var(--star-color);
      background: rgba(255,215,0,0.15);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.3);
    }

    .card-desc {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ПОЛЕ ВВОДА */
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-label {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 8px;
      display: block;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .text-input {
      flex: 1;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      
      caret-color: var(--caret-color);
      caret-shape: bar;
    }

    .text-input:focus {
      outline: none;
      border-color: var(--accent1);
    }

    .text-input::placeholder {
      color: var(--subtext);
      opacity: 0.7;
    }

    .clear-input {
      background: var(--btn-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 50px;
      height: 50px;
      border-radius: 20px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* ВЫБОР РАЗМЕРА */
    .size-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .size-btn {
      flex: 1;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .size-btn:hover {
      transform: translateY(-2px);
    }

    .size-btn:active {
      transform: translateY(0);
    }

    .size-btn.active {
      background: var(--accent1);
      border-color: var(--accent1);
      color: white;
    }

    /* КНОПКА ГЕНЕРАЦИИ */
    .generate-btn {
      width: 100%;
      padding: 18px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    }

    .generate-btn:hover {
      transform: translateY(-2px);
    }

    .generate-btn:active {
      transform: scale(0.98);
    }

    /* КНОПКИ ДЕЙСТВИЙ */
    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      flex: 1;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--btn-bg);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn.primary {
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      border: none;
      color: white;
    }

    /* РЕЗУЛЬТАТ - БЕЗ ВОЗМОЖНОСТИ УВЕЛИЧЕНИЯ */
    .result {
      display: none;
      margin-top: 20px;
    }

    .result-image {
      width: 100%;
      height: auto;
      border-radius: 24px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
      margin-bottom: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      pointer-events: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ЗАГРУЗКА */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent1);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    /* ===== ANDROID ===== */
    html.android-mode .card::before {
      display: none !important;
    }

    html.android-mode .header {
      background: transparent !important;
      backdrop-filter: none !important;
      border-bottom: none !important;
    }

    html.android-mode .back-btn {
      background: transparent !important;
      backdrop-filter: none !important;
      border: none !important;
      color: var(--text) !important;
      font-size: 24px !important;
      width: 40px !important;
      height: 40px !important;
      padding: 0 !important;
    }

    html.android-mode .title {
      background: transparent !important;
      backdrop-filter: none !important;
      border: none !important;
      color: var(--text) !important;
      font-size: 18px !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    html.android-mode .size-btn:hover,
    html.android-mode .generate-btn:hover,
    html.android-mode .action-btn:hover {
      transform: none !important;
    }

    html.android-mode .card {
      backdrop-filter: none !important;
    }

    html.android-mode .text-input {
      border: none !important;
    }

    html.android-mode .result-image {
      pointer-events: none !important;
    }
  </style>
</head>

    // ===== ПОЛУЧЕНИЕ ЯЗЫКА =====
    function getLang() {
      const url = new URL(window.location.href);
      const urlLang = url.searchParams.get("lang");
      if (urlLang) {
        try { localStorage.setItem("miniapp_lang_v1", urlLang); } catch(e) {}
        return urlLang;
      }
      try { 
        const stored = localStorage.getItem("miniapp_lang_v1");
        if (stored) return stored;
      } catch(e) {}
      return "ru";
    }

    // ===== ОБНОВЛЕНИЕ ЯЗЫКА =====
    function updateLanguage() {
      const lang = getLang();
      const t = I18N[lang] || I18N.ru;

      document.getElementById('title').textContent = t.title;
      document.getElementById('cardTitle').textContent = t.cardTitle;
      document.getElementById('cardDesc').textContent = t.cardDesc;
      document.getElementById('promptLabel').textContent = t.promptLabel;
      document.getElementById('promptInput').placeholder = t.promptPlaceholder;
      document.getElementById('sizeSquare').textContent = t.sizeSquare;
      document.getElementById('sizePortrait').textContent = t.sizePortrait;
      document.getElementById('sizeLandscape').textContent = t.sizeLandscape;
      document.getElementById('generateText').textContent = t.generate;
      document.getElementById('saveText').textContent = t.save;
      document.getElementById('repeatText').textContent = t.repeat;
      document.getElementById('loadingText').textContent = t.loading;
      document.getElementById('clearInputBtn').title = t.clear;
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.addEventListener('DOMContentLoaded', updateLanguage);
    window.addEventListener('languageChanged', updateLanguage);

    // Принудительная проверка языка
    let lastLang = getLang();
    setInterval(() => {
      const currentLang = getLang();
      if (currentLang !== lastLang) {
        lastLang = currentLang;
        updateLanguage();
      }
    }, 1000);

    // ===== ПОЛУЧЕНИЕ ПОЛЬЗОВАТЕЛЯ =====
    function getUser() {
      const tg = window.Telegram?.WebApp;
      if (!tg || !tg.initDataUnsafe?.user) return null;
      return tg.initDataUnsafe.user;
    }

    // ===== ПРОВЕРКА БАЛАНСА =====
    async function checkBalance() {
      const user = getUser();
      if (!user) return false;
      try {
        const response = await fetch(`${API_BASE}/api/stars/balance/${user.id}`);
        const data = await response.json();
        return data.balance >= COST;
      } catch (e) {
        console.error("Balance check error:", e);
        return false;
      }
    }

    // ===== СПИСАНИЕ ЗВЕЗД =====
    async function spendStars() {
      const user = getUser();
      if (!user) return false;
      try {
        const response = await fetch(`${API_BASE}/api/stars/spend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tg_user_id: user.id, amount: COST })
        });
        if (!response.ok) {
          if (response.status === 402) throw new Error('insufficient_stars');
          return false;
        }
        return true;
      } catch (e) {
        console.error("Spend stars error:", e);
        throw e;
      }
    }

    // ===== ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЯ =====
    async function generateImage(prompt, size) {
      const user = getUser();
      if (!user) {
        alert("Ошибка: не удалось получить данные пользователя");
        return null;
      }

      document.getElementById('loadingOverlay').style.display = 'flex';

      try {
        const hasBalance = await checkBalance();
        if (!hasBalance) {
          const t = I18N[getLang()] || I18N.ru;
          alert(t.insufficientStars);
          return null;
        }

        const formData = new FormData();
        formData.append('tg_user_id', user.id);
        formData.append('tg_username', user.username || '');
        formData.append('tg_first_name', user.first_name || '');
        formData.append('prompt', prompt);
        formData.append('mode', 'txt2img');
        const [width, height] = size.split('x');
        formData.append('width', width);
        formData.append('height', height);

        const response = await fetch(`${API_BASE}/api/image`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          if (data.error === 'insufficient_stars') throw new Error('insufficient_stars');
          else throw new Error(data.message || 'Ошибка генерации');
        }

        await spendStars();
        return data.image_base64;

      } catch (error) {
        if (error.message === 'insufficient_stars') {
          const t = I18N[getLang()] || I18N.ru;
          alert(t.insufficientStars);
        } else {
          alert('Ошибка: ' + error.message);
        }
        return null;
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    // ===== ОТПРАВКА В БОТА =====
    async function sendToBot(base64Data) {
      const t = I18N[getLang()] || I18N.ru;
      const user = getUser();
      
      try {
        // Конвертируем base64 в blob
        const base64Response = await fetch(base64Data);
        const blob = await base64Response.blob();
        
        // Создаем FormData для отправки
        const formData = new FormData();
        formData.append('user_id', user.id);
        formData.append('image', blob, `image_${Date.now()}.png`);
        formData.append('filename', `image_${Date.now()}.png`);
        
        // Отправляем на сервер, который перешлет в Telegram
        const response = await fetch(`${API_BASE}/api/send-photo`, {
          method: 'POST',
          body: formData
        });
        
        if (response.ok) {
          alert(t.saved);
        } else {
          throw new Error('Failed to send');
        }
      } catch (e) {
        console.error("Send to bot error:", e);
        alert("Ошибка при отправке в бота");
      }
    }

    document.addEventListener('click', function(event) {
      const input = document.getElementById('promptInput');
      const isClickInside = input.contains(event.target);
      if (!isClickInside && document.activeElement === input) input.blur();
    });

    // ===== ЛОГИКА =====
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const resultImg = document.getElementById('resultImg');
    const saveBtn = document.getElementById('saveBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const clearInputBtn = document.getElementById('clearInputBtn');
    
    let currentSize = '1024x1024';
    let currentImageBase64 = null;

    clearInputBtn.addEventListener('click', () => {
      promptInput.value = '';
      promptInput.focus();
    });

    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSize = btn.dataset.size;
      });
    });

    generateBtn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        alert('Введите промпт');
        return;
      }

      const fullPrompt = `${prompt}, high quality, detailed, 8k, masterpiece`;
      const imageBase64 = await generateImage(fullPrompt, currentSize);
      
      if (imageBase64) {
        currentImageBase64 = imageBase64;
        resultImg.src = imageBase64;
        result.style.display = 'block';
        generateBtn.style.display = 'none';
      }
    });

    // Сохранение - теперь отправляет в бота
    saveBtn.addEventListener('click', () => {
      if (currentImageBase64) {
        sendToBot(currentImageBase64);
      }
    });

    repeatBtn.addEventListener('click', () => {
      result.style.display = 'none';
      generateBtn.style.display = 'flex';
    });
  </script>
</body>
</html>
