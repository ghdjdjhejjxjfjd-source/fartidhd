<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Свободный промпт</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
        
        const setHeight = () => {
          const vh = tg.viewportHeight || window.innerHeight;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        };
        
        setHeight();
        tg.onEvent('viewportChanged', setHeight);
      } else {
        const setHeight = () => {
          document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
        };
        setHeight();
        window.addEventListener('resize', setHeight);
      }
    })();
  </script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- Запрет зума -->
  <script>
    (function(){
      document.addEventListener("gesturestart", (e) => e.preventDefault(), { passive:false });
      document.addEventListener("gesturechange", (e) => e.preventDefault(), { passive:false });
      document.addEventListener("gestureend", (e) => e.preventDefault(), { passive:false });

      let lastTouchEnd = 0;
      document.addEventListener("touchend", (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive:false });

      document.addEventListener("dblclick", (e) => e.preventDefault(), { passive:false });
    })();
  </script>

  <style>
    /* ПОЛНОЭКРАННЫЕ СТИЛИ */
    :root {
      --vh: 100vh;
    }
    
    html, body {
      height: var(--vh);
      height: -webkit-fill-available;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }
    
    body {
      position: relative;
      background: transparent;
      color: var(--text);
      display: flex;
      flex-direction: column;
      font-weight: 800 !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-smooth: always;
    }

    /* ===== ТЕМЫ КАК В МЕНЮ ===== */
    :root[data-theme="blue"] { 
      --bg-top: #27384b;
      --bg-mid: #1d2b3a;
      --bg-bot: #16212d;
      --accent1: #5aaeff;
      --accent2: #3496ff;
      --text: #f7fbff;
      --subtext: rgba(247, 251, 255, 0.68);
      --card-bg: rgba(255, 255, 255, .10);
      --card-border: rgba(255, 255, 255, .12);
      --sheet-bg: rgba(24, 31, 40, .97);
      --sheet-border: rgba(255, 255, 255, .10);
      --sheet-text: #f7fbff;
    }
    
    :root[data-theme="black"] { 
      --bg-top: #1b2430;
      --bg-mid: #141b24;
      --bg-bot: #0e141c;
      --accent1: #8bb8ff;
      --accent2: #5a98ff;
      --text: #f7fbff;
      --subtext: rgba(247, 251, 255, 0.68);
      --card-bg: rgba(255, 255, 255, .10);
      --card-border: rgba(255, 255, 255, .12);
      --sheet-bg: rgba(24, 31, 40, .97);
      --sheet-border: rgba(255, 255, 255, .10);
      --sheet-text: #f7fbff;
    }
    
    :root[data-theme="light"] { 
      --bg-top: #e8edf5;
      --bg-mid: #d9e0eb;
      --bg-bot: #cad1de;
      --accent1: #3a8cff;
      --accent2: #1a6cff;
      --text: #1a2634;
      --subtext: rgba(0, 0, 0, 0.5);
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(0, 0, 0, 0.1);
      --sheet-bg: rgba(255, 255, 255, 0.85);
      --sheet-border: rgba(0, 0, 0, 0.1);
      --sheet-text: #1a2634;
    }

    /* ГРАДИЕНТ ФОНА КАК В МЕНЮ */
    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bot) 100%);
      background-attachment: fixed;
    }

    /* ВЕРХНЯЯ ПАНЕЛЬ КАК В МЕНЮ */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 8px 14px;
      padding-top: calc(8px + env(safe-area-inset-top));
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border-bottom: none;
      height: 60px;
    }

    .back-btn {
      color: #a0b0c0;
      text-decoration: none;
      font-size: 15px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 6px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-weight: 600;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 16px;
      color: #a0b0c0;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 6px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      margin: 0 8px;
    }

    .spacer { width: 40px; }

    /* КОНТЕЙНЕР */
    .container {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* КАРТОЧКА КАК В МЕНЮ */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 20px 22px;
      backdrop-filter: blur(12px) saturate(118%);
      -webkit-backdrop-filter: blur(12px) saturate(118%);
      box-shadow: 0 18px 42px rgba(0,0,0,.28);
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon {
      font-size: 32px;
    }

    .card-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--text);
    }

    .star-badge {
      font-size: 14px;
      color: var(--text);
      background: rgba(255,215,0,0.15);
      padding: 4px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,215,0,0.3);
      font-weight: 700;
    }

    .card-desc {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ПОЛЕ ВВОДА КАК В МЕНЮ */
    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 8px;
      display: block;
      text-align: center;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .text-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,.10);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      backdrop-filter: blur(12px) saturate(115%);
      -webkit-backdrop-filter: blur(12px) saturate(115%);
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
      caret-color: var(--accent1);
    }

    .text-input:focus {
      outline: none;
      border-color: var(--accent1);
    }

    .text-input::placeholder {
      color: var(--subtext);
      opacity: 0.8;
    }

    .clear-input {
      background: rgba(255,255,255,.10);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 46px;
      height: 46px;
      border-radius: 16px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px) saturate(115%);
      -webkit-backdrop-filter: blur(12px) saturate(115%);
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
      font-weight: 700;
    }

    /* ВЫБОР РАЗМЕРА КАК В МЕНЮ */
    .size-selector {
      display: flex;
      gap: 10px;
      margin: 16px 0;
    }

    .size-btn {
      flex: 1;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,.10);
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      backdrop-filter: blur(12px) saturate(115%);
      -webkit-backdrop-filter: blur(12px) saturate(115%);
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
      transition: all 0.2s ease;
    }

    .size-btn.active {
      background: var(--accent1);
      border-color: var(--accent1);
      color: white;
    }

    .size-btn:active {
      transform: scale(.995);
    }

    /* КНОПКА ГЕНЕРАЦИИ КАК В МЕНЮ */
    .generate-btn {
      width: 100%;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid color-mix(in srgb, var(--accent1) 24%, rgba(255,255,255,.12));
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--accent1) 18%, white 8%) 0%,
        rgba(255,255,255,.08) 100%
      );
      color: var(--text);
      font-size: 19px;
      font-weight: 800;
      margin: 16px 0;
      cursor: pointer;
      backdrop-filter: blur(12px) saturate(115%);
      -webkit-backdrop-filter: blur(12px) saturate(115%);
      box-shadow: 0 10px 22px rgba(0,0,0,.14);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn:active {
      transform: scale(.995);
    }

    /* КНОПКИ ДЕЙСТВИЙ КАК В МЕНЮ */
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,.10);
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(12px) saturate(115%);
      -webkit-backdrop-filter: blur(12px) saturate(115%);
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .action-btn:active {
      transform: scale(.995);
    }

    .action-btn.primary {
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--accent1) 18%, white 8%) 0%,
        rgba(255,255,255,.08) 100%
      );
      border: 1px solid color-mix(in srgb, var(--accent1) 24%, rgba(255,255,255,.12));
    }

    /* РЕЗУЛЬТАТ */
    .result {
      display: none;
      margin-top: 20px;
    }

    .result-image {
      width: 100%;
      border-radius: 20px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
      margin-bottom: 16px;
      box-shadow: 0 18px 42px rgba(0,0,0,.28);
      pointer-events: none;
      user-select: none;
    }

    /* ЗАГРУЗКА */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent1);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    /* ===== ANDROID ===== */
    html.android-mode .card,
    html.android-mode .text-input,
    html.android-mode .size-btn,
    html.android-mode .action-btn,
    html.android-mode .generate-btn,
    html.android-mode .clear-input {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    html.android-mode .back-btn,
    html.android-mode .title {
      background: rgba(255,255,255,0.08) !important;
      backdrop-filter: none !important;
    }

    html.android-mode .result-image {
      pointer-events: none !important;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="./image.html" class="back-btn">←</a>
    <div class="title" id="title">Свободный промпт</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="card-title-wrapper">
          <span class="card-icon">🖋️</span>
          <span class="card-title" id="cardTitle">Свободный промпт</span>
        </div>
        <span class="star-badge">10⭐</span>
      </div>
      
      <div class="card-desc" id="cardDesc">Напиши что хочешь увидеть — ИИ нарисует в любом стиле</div>

      <!-- Поле ввода -->
      <div class="input-group">
        <label class="input-label" id="promptLabel">Твой промпт</label>
        <div class="input-wrapper">
          <input type="text" class="text-input" id="promptInput" placeholder="например: красивый закат в горах">
          <button class="clear-input" id="clearInputBtn" title="Очистить">✕</button>
        </div>
      </div>

      <!-- Выбор размера -->
      <div class="size-selector">
        <button class="size-btn active" data-size="1024x1024" id="sizeSquare">1:1</button>
        <button class="size-btn" data-size="832x1040" id="sizePortrait">4:5</button>
        <button class="size-btn" data-size="1024x576" id="sizeLandscape">16:9</button>
      </div>

      <!-- Кнопка генерации -->
      <button class="generate-btn" id="generateBtn">
        <span>✨</span>
        <span id="generateText">Сгенерировать</span>
      </button>

      <!-- Результат -->
      <div class="result" id="result">
        <img class="result-image" id="resultImg" src="">
        <div class="action-buttons">
          <button class="action-btn" id="saveBtn">
            <span>💾</span>
            <span id="saveText">Сохранить</span>
          </button>
          <button class="action-btn primary" id="repeatBtn">
            <span>🔄</span>
            <span id="repeatText">Повторить</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ЗАГРУЗКА -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Генерация...</div>
  </div>

  <script>
    // ===== КОНФИГУРАЦИЯ =====
    const API_BASE = "https://fayrat-production.up.railway.app";
    const COST = 10;

    // ===== ПЕРЕВОДЫ =====
    const I18N = {
      ru: {
        title: "Свободный промпт",
        cardTitle: "Свободный промпт",
        cardDesc: "Напиши что хочешь увидеть — ИИ нарисует в любом стиле",
        promptLabel: "Твой промпт",
        promptPlaceholder: "например: красивый закат в горах",
        sizeSquare: "1:1",
        sizePortrait: "4:5",
        sizeLandscape: "16:9",
        generate: "Сгенерировать",
        save: "Сохранить",
        repeat: "Повторить",
        loading: "Генерация...",
        clear: "Очистить",
        insufficientStars: "❌ Недостаточно звезд. Нужно 10⭐",
        error: "Ошибка генерации",
        saved: "✅ Сохранено в галерею"
      },
      en: {
        title: "Free prompt",
        cardTitle: "Free prompt",
        cardDesc: "Write what you want to see — AI will draw in any style",
        promptLabel: "Your prompt",
        promptPlaceholder: "e.g.: beautiful sunset in mountains",
        sizeSquare: "1:1",
        sizePortrait: "4:5",
        sizeLandscape: "16:9",
        generate: "Generate",
        save: "Save",
        repeat: "Repeat",
        loading: "Generating...",
        clear: "Clear",
        insufficientStars: "❌ Insufficient stars. Need 10⭐",
        error: "Generation error",
        saved: "✅ Saved to gallery"
      }
    };

    function getLang() {
      const url = new URL(window.location.href);
      const urlLang = url.searchParams.get("lang");
      if (urlLang) {
        try { localStorage.setItem("miniapp_lang_v1", urlLang); } catch(e) {}
        return urlLang;
      }
      try { 
        const stored = localStorage.getItem("miniapp_lang_v1");
        if (stored) return stored;
      } catch(e) {}
      return "ru";
    }

    function getUser() {
      const tg = window.Telegram?.WebApp;
      if (!tg || !tg.initDataUnsafe?.user) return null;
      return tg.initDataUnsafe.user;
    }

    async function checkBalance() {
      const user = getUser();
      if (!user) return false;
      try {
        const response = await fetch(`${API_BASE}/api/stars/balance/${user.id}`);
        const data = await response.json();
        return data.balance >= COST;
      } catch (e) {
        console.error("Balance check error:", e);
        return false;
      }
    }

    async function spendStars() {
      const user = getUser();
      if (!user) return false;
      try {
        const response = await fetch(`${API_BASE}/api/stars/spend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tg_user_id: user.id, amount: COST })
        });
        if (!response.ok) {
          if (response.status === 402) throw new Error('insufficient_stars');
          return false;
        }
        return true;
      } catch (e) {
        console.error("Spend stars error:", e);
        throw e;
      }
    }

    async function generateImage(prompt, size) {
      const user = getUser();
      if (!user) {
        alert("Ошибка: не удалось получить данные пользователя");
        return null;
      }

      document.getElementById('loadingOverlay').style.display = 'flex';

      try {
        const hasBalance = await checkBalance();
        if (!hasBalance) {
          const t = I18N[getLang()] || I18N.ru;
          alert(t.insufficientStars);
          return null;
        }

        const formData = new FormData();
        formData.append('tg_user_id', user.id);
        formData.append('tg_username', user.username || '');
        formData.append('tg_first_name', user.first_name || '');
        formData.append('prompt', prompt);
        formData.append('mode', 'txt2img');
        const [width, height] = size.split('x');
        formData.append('width', width);
        formData.append('height', height);

        const response = await fetch(`${API_BASE}/api/image`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          if (data.error === 'insufficient_stars') throw new Error('insufficient_stars');
          else throw new Error(data.message || 'Ошибка генерации');
        }

        await spendStars();
        return data.image_base64;

      } catch (error) {
        if (error.message === 'insufficient_stars') {
          const t = I18N[getLang()] || I18N.ru;
          alert(t.insufficientStars);
        } else {
          alert('Ошибка: ' + error.message);
        }
        return null;
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    async function saveToGallery(base64Data) {
      const t = I18N[getLang()] || I18N.ru;
      try {
        const base64Response = await fetch(base64Data);
        const blob = await base64Response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `image_${Date.now()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 100);
        alert(t.saved);
      } catch (e) {
        console.error("Save error:", e);
        alert("Ошибка при сохранении");
      }
    }

    function updateLanguage() {
      const lang = getLang();
      const t = I18N[lang] || I18N.ru;
      document.getElementById('title').textContent = t.title;
      document.getElementById('cardTitle').textContent = t.cardTitle;
      document.getElementById('cardDesc').textContent = t.cardDesc;
      document.getElementById('promptLabel').textContent = t.promptLabel;
      document.getElementById('promptInput').placeholder = t.promptPlaceholder;
      document.getElementById('sizeSquare').textContent = t.sizeSquare;
      document.getElementById('sizePortrait').textContent = t.sizePortrait;
      document.getElementById('sizeLandscape').textContent = t.sizeLandscape;
      document.getElementById('generateText').textContent = t.generate;
      document.getElementById('saveText').textContent = t.save;
      document.getElementById('repeatText').textContent = t.repeat;
      document.getElementById('loadingText').textContent = t.loading;
      document.getElementById('clearInputBtn').title = t.clear;
    }

    document.addEventListener('click', function(event) {
      const input = document.getElementById('promptInput');
      const isClickInside = input.contains(event.target);
      if (!isClickInside && document.activeElement === input) input.blur();
    });

    document.addEventListener('DOMContentLoaded', updateLanguage);
    window.addEventListener('languageChanged', updateLanguage);

    let lastLang = getLang();
    setInterval(() => {
      const currentLang = getLang();
      if (currentLang !== lastLang) {
        lastLang = currentLang;
        updateLanguage();
      }
    }, 1000);

    // ===== ЛОГИКА =====
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const resultImg = document.getElementById('resultImg');
    const saveBtn = document.getElementById('saveBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const clearInputBtn = document.getElementById('clearInputBtn');
    
    let currentSize = '1024x1024';
    let currentImageBase64 = null;

    clearInputBtn.addEventListener('click', () => {
      promptInput.value = '';
      promptInput.focus();
    });

    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSize = btn.dataset.size;
      });
    });

    generateBtn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        alert('Введите промпт');
        return;
      }

      const fullPrompt = `${prompt}, high quality, detailed, 8k, masterpiece`;
      const imageBase64 = await generateImage(fullPrompt, currentSize);
      
      if (imageBase64) {
        currentImageBase64 = imageBase64;
        resultImg.src = imageBase64;
        result.style.display = 'block';
        generateBtn.style.display = 'none';
      }
    });

    saveBtn.addEventListener('click', () => {
      if (currentImageBase64) saveToGallery(currentImageBase64);
    });

    repeatBtn.addEventListener('click', () => {
      result.style.display = 'none';
      generateBtn.style.display = 'flex';
    });
  </script>
</body>
</html>
