<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>AI Chat</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
        
        const setHeight = () => {
          const vh = tg.viewportHeight || window.innerHeight;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        };
        
        setHeight();
        tg.onEvent('viewportChanged', setHeight);
      } else {
        const setHeight = () => {
          document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
        };
        setHeight();
        window.addEventListener('resize', setHeight);
      }
    })();
  </script>

  <!-- ТЕМА: применяем сразу -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      const theme = getTheme();
      document.documentElement.setAttribute("data-theme", theme);
      try{ localStorage.setItem(KEY, theme); }catch(e){}
    })();
  </script>

  <link rel="stylesheet" href="./css/base.css?v=3">
  <link rel="stylesheet" href="./css/panels.css?v=3">
  <link rel="stylesheet" href="./css/chat.css?v=3">
  
  <style>
    .limit-hint {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
      margin-bottom: 8px;
      padding-left: 8px;
      text-align: left;
      width: 100%;
    }
    .limit-hint.warning {
      color: #ff4444;
    }
    .settings-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
      margin-bottom: 4px;
    }
    .settings-row select {
      width: 100%;
      margin-top: 4px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: inherit;
    }
    .settings-row select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: space-between;
    }
    .button-row button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }
    .button-row button.primary {
      background: var(--accent1);
      border-color: var(--accent2);
    }
    .button-row button.primary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .button-row button:hover:not(:disabled) {
      background: rgba(255,255,255,0.2);
    }
    .button-row button.primary:hover:not(:disabled) {
      background: var(--accent2);
    }
    .unsaved-badge {
      font-size: 11px;
      color: #ffaa00;
      margin-left: 8px;
    }

    /* Стили для спиннера на кнопке */
    .spinner-small {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Запрет закрытия при сохранении */
    body.saving .overlay {
      pointer-events: none;
    }
    
    body.saving .button-row button:not(.primary) {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Стили для светлой темы */
    :root[data-theme="light"] .settings-row select {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 0, 0, 0.15);
      color: #1a2634;
    }
    :root[data-theme="light"] .button-row button {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 0, 0, 0.15);
      color: #1a2634;
    }
    :root[data-theme="light"] .button-row button.primary {
      background: var(--accent1);
      color: white;
    }
    :root[data-theme="light"] .spinner-small {
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--accent1);
    }
    :root[data-theme="light"] .sheet {
      background: rgba(240, 240, 245, 0.97);
      border-color: rgba(0, 0, 0, 0.1);
    }
    :root[data-theme="light"] .pill {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 0, 0, 0.1);
      color: #1a2634;
    }

    /* ===== НОВЫЕ СТИЛИ ===== */
    /* Контейнер для поля ввода с кнопкой глобуса */
    .input {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 12px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      background: transparent;
    }

    /* Кнопка-глобус */
    .search-toggle {
      width: 42px;
      height: 42px;
      border-radius: 21px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      line-height: 1;
    }

    .search-toggle:hover {
      background: rgba(255,255,255,0.15);
    }

    .search-toggle.active {
      background: var(--accent1);
      border-color: var(--accent2);
      box-shadow: 0 0 10px rgba(58,160,255,0.5);
    }

    /* Поле ввода */
    .input textarea {
      flex: 1;
      padding: 11px 15px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      outline: none;
      font-size: 15px;
      color: #f7fbff;
      background: #25303c;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.45;
      font-family: inherit;
    }

    /* Модальное окно для поиска */
    .search-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .search-modal.show {
      display: flex;
    }

    .search-modal-content {
      background: #1a2634;
      border-radius: 24px;
      padding: 24px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .search-modal-content h3 {
      margin: 0 0 12px 0;
      font-size: 20px;
      color: #fff;
    }

    .search-modal-content p {
      margin: 0 0 16px 0;
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
    }

    .warning-text {
      background: rgba(255, 100, 100, 0.15);
      border: 1px solid #ff6464;
      border-radius: 12px;
      padding: 12px;
      margin: 16px 0;
      color: #ff6464;
      font-size: 15px;
      font-weight: 500;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn.confirm {
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      color: white;
    }

    .modal-btn.cancel {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .modal-btn.confirm:hover {
      transform: scale(1.02);
      filter: brightness(1.1);
    }

    .modal-btn.cancel:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Светлая тема для модалки */
    :root[data-theme="light"] .search-modal-content {
      background: #f0f0f5;
      border-color: rgba(0,0,0,0.1);
    }

    :root[data-theme="light"] .search-modal-content h3 {
      color: #1a2634;
    }

    :root[data-theme="light"] .search-modal-content p {
      color: #2c3e50;
    }

    :root[data-theme="light"] .warning-text {
      background: rgba(255, 100, 100, 0.1);
      border-color: #ff4444;
      color: #ff4444;
    }

    :root[data-theme="light"] .modal-btn.cancel {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.1);
      color: #1a2634;
    }
  </style>
</head>

<body>

  <div class="top">
    <a href="./index.html">←</a>
    <div class="title" id="titleText">AI Chat</div>
    <div class="spacer"></div>
    <button class="gear" id="gearBtn" aria-label="Настройки">⚙️</button>
  </div>

  <div class="chat" id="chat"></div>

  <!-- ===== ИСПРАВЛЕННОЕ ПОЛЕ ВВОДА ===== -->
  <div class="input">
    <button class="search-toggle" id="searchToggleBtn" title="Поиск в интернете">🌐</button>
    <textarea id="text"
      placeholder="Напиши сообщение…"
      autocomplete="on"
      autocapitalize="sentences"
      autocorrect="on"
      spellcheck="true"
      rows="1"
    ></textarea>
    <button id="sendBtn">▶</button>
  </div>

  <!-- ===== НОВОЕ МОДАЛЬНОЕ ОКНО ===== -->
  <div class="search-modal" id="searchModal">
    <div class="search-modal-content">
      <h3>🔍 Поиск в интернете</h3>
      <p>Включить поиск в интернете для этого сообщения?</p>
      <div class="warning-text">
        ⚠️ Звезды будут тратиться больше
      </div>
      <div class="modal-buttons">
        <button class="modal-btn confirm" id="confirmSearchBtn">✅ ДА</button>
        <button class="modal-btn cancel" id="cancelSearchBtn">❌ НЕТ</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="sheet">
      <h3 id="settingsTitle">⚙️ Настройки</h3>

      <!-- Режим ИИ -->
      <div class="settings-row">
        <div id="aiModeLabel">Режим ИИ</div>
        <select id="aiModeSel">
          <option value="fast" id="optFast">🚀 Быстрый (0.3 ⭐)</option>
          <option value="quality" id="optQuality">💎 Качественный (1 ⭐)</option>
        </select>
      </div>
      <div id="aiMode-limit" class="limit-hint"></div>

      <!-- Стиль ответа с отображением лимита -->
      <div class="settings-row">
        <div id="styleLabel">Стиль ответа</div>
        <select id="styleSel">
          <option value="short" id="optShort">Коротко</option>
          <option value="steps" id="optSteps">По шагам</option>
          <option value="detail" id="optDetail">Подробно</option>
        </select>
      </div>
      <div id="style-limit" class="limit-hint"></div>

      <!-- Характер с отображением лимита -->
      <div class="settings-row">
        <div id="personaLabel">Характер</div>
        <select id="personaSel">
          <option value="friendly" id="optFriendly">Общительный</option>
          <option value="fun" id="optFun">Весёлый</option>
          <option value="strict" id="optStrict">Строгий</option>
          <option value="smart" id="optSmart">Умный</option>
        </select>
      </div>
      <div id="persona-limit" class="limit-hint"></div>

      <!-- Кнопка очистки чата -->
      <div class="row">
        <div id="chatLabel">Чат</div>
        <button class="pill" id="clearBtn">🧹 Очистить</button>
      </div>

      <!-- Кнопки: Сохранить и Отмена -->
      <div class="button-row">
        <button class="primary" id="saveSettingsBtn" disabled>💾 Сохранить</button>
        <button id="cancelSettingsBtn">✖ Отмена</button>
      </div>

      <!-- Индикатор несохраненных изменений -->
      <div id="unsaved-indicator" style="display: none; text-align: center; margin-top: 8px; font-size: 12px; color: #ffaa00;">
        ⚡ Есть несохраненные изменения
      </div>
    </div>
  </div>
