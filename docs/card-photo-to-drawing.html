<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Фото → Рисунок</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
        
        document.body.style.overflow = 'hidden';
        const container = document.querySelector('.container');
        if (container) {
          container.style.overflowY = 'auto';
          container.style.webkitOverflowScrolling = 'touch';
        }
      }
    })();
  </script>

  <!-- ТЕМА из URL -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- ПЛАТФОРМА из URL -->
  <script>
    (function(){
      const KEY = "miniapp_platform_v1";
      function getPlatform(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("platform");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "ios"; }catch(e){ return "ios"; }
      }
      const platform = getPlatform();
      if (platform === 'android') {
        document.documentElement.classList.add('android-mode');
      }
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== ТЕМЫ ===== */
    :root[data-theme="blue"] { 
      --bg-top: #27384b;
      --bg-mid: #1d2b3a;
      --bg-bot: #16212d;
      --accent1: #5aaeff;
      --accent2: #3496ff;
      --text: #f7fbff;
      --subtext: rgba(247, 251, 255, 0.68);
      --card-bg: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.12);
      --input-bg: rgba(255, 255, 255, 0.08);
      --btn-bg: rgba(90, 174, 255, 0.2);
      --star-color: #ffffff;
      --header-text: #f7fbff;
      --caret-color: #ffffff;
      --upload-bg: rgba(90, 174, 255, 0.1);
    }
    
    :root[data-theme="black"] { 
      --bg-top: #1b2430;
      --bg-mid: #141b24;
      --bg-bot: #0e141c;
      --accent1: #8bb8ff;
      --accent2: #5a98ff;
      --text: #f7fbff;
      --subtext: rgba(247, 251, 255, 0.68);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --input-bg: rgba(255, 255, 255, 0.06);
      --btn-bg: rgba(139, 184, 255, 0.15);
      --star-color: #ffffff;
      --header-text: #f7fbff;
      --caret-color: #ffffff;
      --upload-bg: rgba(139, 184, 255, 0.1);
    }
    
    :root[data-theme="light"] { 
      --bg-top: #e8edf5;
      --bg-mid: #d9e0eb;
      --bg-bot: #cad1de;
      --accent1: #3a8cff;
      --accent2: #1a6cff;
      --text: #2c3e50;
      --subtext: #4a5a6a;
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-border: rgba(0, 0, 0, 0.1);
      --input-bg: rgba(255, 255, 255, 0.95);
      --btn-bg: rgba(58, 140, 255, 0.1);
      --star-color: #2c3e50;
      --header-text: #2c3e50;
      --caret-color: #3a8cff;
      --upload-bg: rgba(58, 140, 255, 0.05);
    }

    /* ГРАДИЕНТ ФОНА */
    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bot) 100%);
      background-attachment: fixed;
    }

    /* ===== iOS - ВЕРХНЯЯ ПАНЕЛЬ ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border-bottom: none;
      height: 60px;
    }

    .back-btn {
      color: var(--header-text);
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
      color: var(--header-text);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin: 0 12px;
    }

    .spacer { width: 40px; }

    /* КОНТЕЙНЕР */
    .container {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ===== КАРТОЧКА ===== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* БЕГУЩАЯ ЗМЕЙКА */
    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 30px;
      padding: 2px;
      background: linear-gradient(
        90deg,
        #ff0000,
        #ff7f00,
        #ffff00,
        #00ff00,
        #0000ff,
        #4b0082,
        #8f00ff,
        #ff0000
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: snakeMove 3s linear infinite;
      background-size: 300% 100%;
      opacity: 0.7;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes snakeMove {
      0% { background-position: 0% 0; }
      100% { background-position: 300% 0; }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon {
      font-size: 32px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .star-badge {
      font-size: 16px;
      color: var(--star-color);
      background: rgba(255,215,0,0.15);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.3);
    }

    .card-desc {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ===== ВЫБОР СТИЛЯ РИСУНКА ===== */
    .style-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .style-btn {
      flex: 1;
      min-width: 70px;
      padding: 12px 8px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .style-btn:hover {
      transform: translateY(-2px);
    }

    .style-btn.active {
      background: var(--accent1);
      border-color: var(--accent1);
      color: white;
    }

    .style-icon {
      font-size: 24px;
    }

    /* ===== ОБЛАСТЬ ЗАГРУЗКИ ===== */
    .upload-area {
      background: var(--upload-bg);
      border: 2px dashed var(--card-border);
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .upload-area:hover {
      border-color: var(--accent1);
      background: rgba(255,255,255,0.15);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 16px;
      color: var(--subtext);
      font-weight: 600;
    }

    .upload-hint {
      font-size: 12px;
      color: var(--subtext);
      opacity: 0.7;
      margin-top: 4px;
    }

    /* ===== ПРЕВЬЮ ФОТО ===== */
    .preview-container {
      display: none;
      margin-bottom: 20px;
      position: relative;
    }

    .preview-image {
      width: 100%;
      border-radius: 20px;
      border: 2px solid var(--accent1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 20px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    .remove-btn:hover {
      background: rgba(255, 0, 0, 0.5);
      transform: scale(1.1);
    }

    /* КНОПКА ГЕНЕРАЦИИ */
    .generate-btn {
      width: 100%;
      padding: 18px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    }

    .generate-btn:hover {
      transform: translateY(-2px);
    }

    .generate-btn:active {
      transform: scale(0.98);
    }

    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* КНОПКИ ДЕЙСТВИЙ */
    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      flex: 1;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--btn-bg);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn.primary {
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      border: none;
      color: white;
    }

    /* РЕЗУЛЬТАТ */
    .result {
      display: none;
      margin-top: 20px;
    }

    .result-image {
      width: 100%;
      height: auto;
      border-radius: 24px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
      margin-bottom: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      pointer-events: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ЗАГРУЗКА */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent1);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    /* ===== ANDROID ===== */
    html.android-mode .card::before {
      display: none !important;
    }

    html.android-mode .header {
      background: transparent !important;
      backdrop-filter: none !important;
      border-bottom: none !important;
    }

    html.android-mode .back-btn {
      background: transparent !important;
      backdrop-filter: none !important;
      border: none !important;
      color: var(--text) !important;
      font-size: 24px !important;
      width: 40px !important;
      height: 40px !important;
      padding: 0 !important;
    }

    html.android-mode .title {
      background: transparent !important;
      backdrop-filter: none !important;
      border: none !important;
      color: var(--text) !important;
      font-size: 18px !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    html.android-mode .style-btn:hover,
    html.android-mode .generate-btn:hover,
    html.android-mode .action-btn:hover {
      transform: none !important;
    }

    html.android-mode .card {
      backdrop-filter: none !important;
    }

    html.android-mode .upload-area {
      backdrop-filter: none !important;
    }

    html.android-mode .remove-btn {
      backdrop-filter: none !important;
    }

    html.android-mode .result-image {
      pointer-events: none !important;
    }
  </style>
</head>

      <!-- Кнопка генерации -->

      <!-- Результат -->
      <div class="result" id="result">
        <img class="result-image" id="resultImg" src="">
        <div class="action-buttons">
          <button class="action-btn" id="saveBtn">
            <span>💾</span>

            <span>🔄</span>

        </div>
      </div>
    </div>
  </div>

        generate: "Перетворити в малюнок",
        save: "Зберегти",
        repeat: "Повторити",
        loading: "Створення...",
        remove: "Видалити",
        stylePencil: "Олівець",
        styleWatercolor: "Акварель",
        styleOil: "Олія",
        styleSketch: "Ескіз",
        insufficientStars: "❌ Недостатньо зірок. Потрібно 10⭐",
        error: "Помилка",
        saved: "✅ Відправлено в бота"
      },
      fr: {
        title: "Photo → Dessin",
        cardTitle: "Photo → Dessin",
        cardDesc: "Transforme ta photo en dessin",
        uploadText: "Clique pour sélectionner une photo",
        uploadHint: "PNG, JPG (max 5MB)",
        generate: "Transformer en dessin",
        save: "Enregistrer",
        repeat: "Répéter",
        loading: "Génération...",
        remove: "Supprimer",
        stylePencil: "Crayon",
        styleWatercolor: "Aquarelle",
        styleOil: "Huile",
        styleSketch: "Esquisse",
        insufficientStars: "❌ Étoiles insuffisantes. Besoin de 10⭐",
        error: "Erreur",
        saved: "✅ Envoyé au bot"
      }
    };

    // ===== ПОЛУЧЕНИЕ ЯЗЫКА =====
    function getLang() {
      const url = new URL(window.location.href);
      const urlLang = url.searchParams.get("lang");
      if (urlLang) {
        try { localStorage.setItem("miniapp_lang_v1", urlLang); } catch(e) {}
        return urlLang;
      }
      try { 
        const stored = localStorage.getItem("miniapp_lang_v1");
        if (stored) return stored;
      } catch(e) {}
      return "ru";
    }

    // ===== ОБНОВЛЕНИЕ ЯЗЫКА =====
    function updateLanguage() {
      const lang = getLang();
      const t = I18N[lang] || I18N.ru;

      document.getElementById('title').textContent = t.title;
      document.getElementById('cardTitle').textContent = t.cardTitle;
      document.getElementById('cardDesc').textContent = t.cardDesc;
      document.getElementById('uploadText').textContent = t.uploadText;
      document.getElementById('uploadHint').textContent = t.uploadHint;
      document.getElementById('generateText').textContent = t.generate;
      document.getElementById('saveText').textContent = t.save;
      document.getElementById('repeatText').textContent = t.repeat;
      document.getElementById('loadingText').textContent = t.loading;
      document.getElementById('removeBtn').title = t.remove;
      document.getElementById('stylePencilText').textContent = t.stylePencil;
      document.getElementById('styleWatercolorText').textContent = t.styleWatercolor;
      document.getElementById('styleOilText').textContent = t.styleOil;
      document.getElementById('styleSketchText').textContent = t.styleSketch;
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.addEventListener('DOMContentLoaded', updateLanguage);
    window.addEventListener('languageChanged', updateLanguage);

    // Принудительная проверка языка
    let lastLang = getLang();
    setInterval(() => {
      const currentLang = getLang();
      if (currentLang !== lastLang) {
        lastLang = currentLang;
        updateLanguage();
      }
    }, 1000);

    // ===== ПОЛУЧЕНИЕ ПОЛЬЗОВАТЕЛЯ =====
    function getUser() {
      const tg = window.Telegram?.WebApp;
      if (!tg || !tg.initDataUnsafe?.user) return null;
      return tg.initDataUnsafe.user;
    }

    // ===== ПРОВЕРКА БАЛАНСА =====
    async function checkBalance() {
      const user = getUser();
      if (!user) return false;
      try {
        const response = await fetch(`${API_BASE}/api/stars/balance/${user.id}`);
        const data = await response.json();
        return data.balance >= COST;
      } catch (e) {
        console.error("Balance check error:", e);
        return false;
      }
    }

    // ===== СПИСАНИЕ ЗВЕЗД =====
    async function spendStars() {
      const user = getUser();
      if (!user) return false;
      try {
        const response = await fetch(`${API_BASE}/api/stars/spend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tg_user_id: user.id, amount: COST })
        });
        if (!response.ok) {
          if (response.status === 402) throw new Error('insufficient_stars');
          return false;
        }
        return true;
      } catch (e) {
        console.error("Spend stars error:", e);
        throw e;
      }
    }

    // ===== ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЯ =====
    async function generateImage(imageFile, style) {
      const user = getUser();
      if (!user) {
        alert("Ошибка: не удалось получить данные пользователя");
        return null;
      }

      if (!imageFile) {
        alert("Выберите фото");
        return null;
      }

      document.getElementById('loadingOverlay').style.display = 'flex';

      try {
        const hasBalance = await checkBalance();
        if (!hasBalance) {
          const t = I18N[getLang()] || I18N.ru;
          alert(t.insufficientStars);
          return null;
        }

        // Получаем промпт для выбранного стиля
        const basePrompt = STYLE_PROMPTS[style] || STYLE_PROMPTS.pencil;
        const negativePrompt = "bad anatomy, extra fingers, missing fingers, deformed, ugly, text, letters, words, watermark, signature, logo, writing, caption, label, messy, cluttered, busy background, photo, photograph, realistic";

        console.log("🎨 Style:", style);
        console.log("📝 Prompt:", basePrompt);

        const formData = new FormData();
        formData.append('tg_user_id', user.id);
        formData.append('tg_username', user.username || '');
        formData.append('tg_first_name', user.first_name || '');
        formData.append('prompt', basePrompt);
        formData.append('negative_prompt', negativePrompt);
        formData.append('mode', 'img2img');
        formData.append('strength', '0.75'); // Чуть сильнее для рисунков
        formData.append('image', imageFile);

        const response = await fetch(`${API_BASE}/api/image`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          if (data.error === 'insufficient_stars') throw new Error('insufficient_stars');
          else throw new Error(data.message || 'Ошибка генерации');
        }

        await spendStars();
        return data.image_base64;

      } catch (error) {
        if (error.message === 'insufficient_stars') {
          const t = I18N[getLang()] || I18N.ru;
          alert(t.insufficientStars);
        } else {
          alert('Ошибка: ' + error.message);
        }
        return null;
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    // ===== ОТПРАВКА В БОТА =====
    async function sendToBot(base64Data) {
      const t = I18N[getLang()] || I18N.ru;
      const user = getUser();
      
      if (!user) {
        alert("Ошибка: пользователь не найден");
        return;
      }
      
      try {
        const base64Response = await fetch(base64Data);
        const blob = await base64Response.blob();
        
        const formData = new FormData();
        formData.append('user_id', user.id);
        formData.append('image', blob, `drawing_${Date.now()}.png`);
        formData.append('filename', `drawing_${Date.now()}.png`);
        
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingText').textContent = t.loading;
        
        const response = await fetch(`${API_BASE}/api/send-photo`, {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          alert(t.saved);
        } else {
          console.error("Send error:", data);
          alert("Ошибка при отправке в бота: " + (data.error || data.message || "неизвестная ошибка"));
        }
      } catch (e) {
        console.error("Send to bot error:", e);
        alert("Ошибка при отправке в бота");
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('loadingText').textContent = t.loading;
      }
    }

    // ===== ЛОГИКА =====
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewImg = document.getElementById('previewImg');
    const removeBtn = document.getElementById('removeBtn');
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const resultImg = document.getElementById('resultImg');
    const saveBtn = document.getElementById('saveBtn');
    const repeatBtn = document.getElementById('repeatBtn');

    let currentFile = null;
    let currentImageBase64 = null;
    let currentStyle = 'pencil';

    // Выбор стиля
    document.querySelectorAll('.style-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStyle = btn.dataset.style;
      });
    });

    // Загрузка фото
    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        
        if (file.size > 5 * 1024 * 1024) {
          alert('Файл слишком большой. Максимум 5MB');
          return;
        }
        
        currentFile = file;
        
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          uploadArea.style.display = 'none';
          previewContainer.style.display = 'block';
          generateBtn.disabled = false;
        };
        reader.readAsDataURL(file);
      }
    });

    // Удалить фото
    removeBtn.addEventListener('click', () => {
      currentFile = null;
      previewContainer.style.display = 'none';
      uploadArea.style.display = 'block';
      fileInput.value = '';
      generateBtn.disabled = true;
    });

    // Генерация
    generateBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      const imageBase64 = await generateImage(currentFile, currentStyle);
      
      if (imageBase64) {
        currentImageBase64 = imageBase64;
        resultImg.src = imageBase64;
        result.style.display = 'block';
        generateBtn.style.display = 'none';
        previewContainer.style.display = 'none';
      }
    });

    // Сохранение
    saveBtn.addEventListener('click', () => {
      if (currentImageBase64) {
        sendToBot(currentImageBase64);
      }
    });

    // Повторить
    repeatBtn.addEventListener('click', () => {
      result.style.display = 'none';
      generateBtn.style.display = 'flex';
      uploadArea.style.display = 'block';
      previewContainer.style.display = 'none';
      fileInput.value = '';
      currentFile = null;
      currentImageBase64 = null;
      generateBtn.disabled = true;
    });
  </script>
</body>
</html>
