<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Цветочная фантазия</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
      }
    })();
  </script>

  <!-- ТЕМА из URL -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- ПЛАТФОРМА из URL -->
  <script>
    (function(){
      const KEY = "miniapp_platform_v1";
      function getPlatform(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("platform");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "ios"; }catch(e){ return "ios"; }
      }
      const platform = getPlatform();
      if (platform === 'android') {
        document.documentElement.classList.add('android-mode');
      }
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    :root[data-theme="blue"] { --accent1: #5aaeff; --accent2: #3496ff; }
    :root[data-theme="black"] { --accent1: #8bb8ff; --accent2: #5a98ff; }
    :root[data-theme="light"] { --accent1: #3a8cff; --accent2: #1a6cff; }

    /* ШАПКА */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .spacer { width: 40px; }

    /* КОНТЕЙНЕР */
    .container {
      padding: 80px 16px 20px;
    }

    /* КАРТОЧКА */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      margin-bottom: 24px;
    }

    /* ВЫБОР ТИПА ЦВЕТОВ */
    .flower-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .flower-btn {
      flex: 1;
      min-width: 70px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .flower-btn.active {
      background: var(--accent1);
      border-color: var(--accent1);
    }

    /* ВЫБОР ЦВЕТА */
    .color-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .color-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-btn.active {
      border-color: white;
      transform: scale(1.1);
    }

    .color-btn.pink { background: #ff99cc; }
    .color-btn.red { background: #ff6666; }
    .color-btn.purple { background: #cc99ff; }
    .color-btn.blue { background: #99ccff; }
    .color-btn.yellow { background: #ffff99; }
    .color-btn.white { background: #ffffff; }

    /* ПОЛЕ ВВОДА (ДОПОЛНИТЕЛЬНО) */
    .prompt-input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .prompt-input:focus {
      outline: none;
      border-color: var(--accent1);
    }

    /* КНОПКА ГЕНЕРАЦИИ */
    .generate-btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .generate-btn:active {
      transform: scale(0.98);
    }

    /* РЕЗУЛЬТАТ */
    .result {
      display: none;
      margin-top: 20px;
    }

    .result-image {
      width: 100%;
      border-radius: 16px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .action-btn.primary {
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      border: none;
    }

    /* СВЕТЛАЯ ТЕМА */
    :root[data-theme="light"] {
      --text-primary: #2c3e50;
    }
    :root[data-theme="light"] body {
      color: var(--text-primary);
    }
    :root[data-theme="light"] .flower-btn {
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      border: 1px solid rgba(0,0,0,0.15);
    }
    :root[data-theme="light"] .prompt-input {
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      border: 1px solid rgba(0,0,0,0.15);
    }
    :root[data-theme="light"] .action-btn {
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      border: 1px solid rgba(0,0,0,0.15);
    }

    /* ANDROID */
    html.android-mode .card,
    html.android-mode .flower-btn,
    html.android-mode .prompt-input {
      backdrop-filter: none !important;
      background: rgba(255,255,255,0.08) !important;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="./image.html" class="back-btn">←</a>
    <div class="title" id="title">Цветочная фантазия</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-icon">🌸</div>
      <div class="card-title" id="cardTitle">Цветочная фантазия</div>
      <div class="card-desc" id="cardDesc">Создай волшебные цветы</div>

      <!-- Выбор типа цветов -->
      <div class="flower-selector">
        <button class="flower-btn active" data-flower="roses" id="flowerRoses">🌹 Розы</button>
        <button class="flower-btn" data-flower="tulips" id="flowerTulips">🌷 Тюльпаны</button>
        <button class="flower-btn" data-flower="cherry" id="flowerCherry">🌸 Сакура</button>
        <button class="flower-btn" data-flower="lavender" id="flowerLavender">💜 Лаванда</button>
        <button class="flower-btn" data-flower="mixed" id="flowerMixed">✨ Микс</button>
      </div>

      <!-- Выбор цвета -->
      <div class="color-selector">
        <button class="color-btn pink active" data-color="pink" title="Розовый"></button>
        <button class="color-btn red" data-color="red" title="Красный"></button>
        <button class="color-btn purple" data-color="purple" title="Фиолетовый"></button>
        <button class="color-btn blue" data-color="blue" title="Синий"></button>
        <button class="color-btn yellow" data-color="yellow" title="Желтый"></button>
        <button class="color-btn white" data-color="white" title="Белый"></button>
      </div>

      <!-- Дополнительное описание -->
      <input type="text" class="prompt-input" id="promptInput" placeholder="Добавь волшебства... (необязательно)">

      <!-- Кнопка генерации -->
      <button class="generate-btn" id="generateBtn">✨ Создать</button>

      <!-- Результат -->
      <div class="result" id="result">
        <img class="result-image" id="resultImg" src="">
        <div class="action-buttons">
          <button class="action-btn" id="saveBtn">💾 Сохранить</button>
          <button class="action-btn primary" id="newBtn">🔄 Новое</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/image-card.js"></script>

  <script>
    // ===== ПЕРЕВОДЫ =====
    const I18N = {
      ru: {
        title: "Цветочная фантазия",
        cardTitle: "Цветочная фантазия",
        cardDesc: "Создай волшебные цветы",
        generate: "✨ Создать",
        save: "💾 Сохранить",
        new: "🔄 Новое",
        loading: "Создаем цветы...",
        promptPlaceholder: "Добавь волшебства... (необязательно)",
        flowerRoses: "🌹 Розы",
        flowerTulips: "🌷 Тюльпаны",
        flowerCherry: "🌸 Сакура",
        flowerLavender: "💜 Лаванда",
        flowerMixed: "✨ Микс"
      },
      en: {
        title: "Flower fantasy",
        cardTitle: "Flower fantasy",
        cardDesc: "Create magical flowers",
        generate: "✨ Create",
        save: "💾 Save",
        new: "🔄 New",
        loading: "Creating flowers...",
        promptPlaceholder: "Add magic... (optional)",
        flowerRoses: "🌹 Roses",
        flowerTulips: "🌷 Tulips",
        flowerCherry: "🌸 Cherry",
        flowerLavender: "💜 Lavender",
        flowerMixed: "✨ Mixed"
      },
      kk: {
        title: "Гүлді фантазия",
        cardTitle: "Гүлді фантазия",
        cardDesc: "Сиқырлы гүлдер жаса",
        generate: "✨ Жасау",
        save: "💾 Сақтау",
        new: "🔄 Жаңа",
        loading: "Гүлдер жасалуда...",
        promptPlaceholder: "Сиқыр қос... (міндетті емес)",
        flowerRoses: "🌹 Раушан",
        flowerTulips: "🌷 Қызғалдақ",
        flowerCherry: "🌸 Сакура",
        flowerLavender: "💜 Лаванда",
        flowerMixed: "✨ Аралас"
      }
    };

    function getLang() {
      const url = new URL(window.location.href);
      const qp = url.searchParams.get("lang");
      if (qp) return qp;
      try { return localStorage.getItem("miniapp_lang_v1") || "ru"; } 
      catch(e) { return "ru"; }
    }

    const lang = getLang();
    const t = I18N[lang] || I18N.ru;

    // Применяем переводы
    document.getElementById('title').textContent = t.title;
    document.getElementById('cardTitle').textContent = t.cardTitle;
    document.getElementById('cardDesc').textContent = t.cardDesc;
    document.getElementById('generateBtn').textContent = t.generate;
    document.getElementById('saveBtn').textContent = t.save;
    document.getElementById('newBtn').textContent = t.new;
    document.getElementById('promptInput').placeholder = t.promptPlaceholder;
    document.getElementById('flowerRoses').textContent = t.flowerRoses;
    document.getElementById('flowerTulips').textContent = t.flowerTulips;
    document.getElementById('flowerCherry').textContent = t.flowerCherry;
    document.getElementById('flowerLavender').textContent = t.flowerLavender;
    document.getElementById('flowerMixed').textContent = t.flowerMixed;

    // ===== ЛОГИКА =====
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const resultImg = document.getElementById('resultImg');
    const saveBtn = document.getElementById('saveBtn');
    const newBtn = document.getElementById('newBtn');
    const promptInput = document.getElementById('promptInput');

    let currentImageBase64 = null;
    let currentFlower = 'roses';
    let currentColor = 'pink';

    // Выбор типа цветов
    document.querySelectorAll('.flower-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.flower-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFlower = btn.dataset.flower;
      });
    });

    // Выбор цвета
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentColor = btn.dataset.color;
      });
    });

    // Цвета на английском для промпта
    const colorNames = {
      pink: 'pink',
      red: 'red',
      purple: 'purple',
      blue: 'blue',
      yellow: 'yellow',
      white: 'white'
    };

    // Промпты для разных цветов
    const flowerPrompts = {
      roses: "beautiful roses, {color} color, soft petals, magical, fantasy flowers, glowing, ethereal",
      tulips: "beautiful tulips, {color} color, delicate petals, magical, fantasy flowers, glowing",
      cherry: "cherry blossoms, sakura, {color} color, soft petals, magical, fantasy flowers, glowing",
      lavender: "lavender flowers, {color} color, purple fields, magical, fantasy flowers, glowing",
      mixed: "mixed beautiful flowers, {color} color, magical garden, fantasy flowers, glowing, ethereal"
    };

    // Генерация
    generateBtn.addEventListener('click', async () => {
      // Базовый промпт
      let basePrompt = flowerPrompts[currentFlower] || flowerPrompts.roses;
      basePrompt = basePrompt.replace('{color}', colorNames[currentColor] || 'pink');
      
      const additionalPrompt = promptInput.value.trim();
      const fullPrompt = additionalPrompt 
        ? `${basePrompt}, ${additionalPrompt}, highly detailed, 8k, masterpiece`
        : `${basePrompt}, highly detailed, 8k, masterpiece`;

      const imageBase64 = await generateImage(fullPrompt, "txt2img");
      
      if (imageBase64) {
        currentImageBase64 = imageBase64;
        resultImg.src = imageBase64;
        result.style.display = 'block';
        generateBtn.style.display = 'none';
      }
    });

    // Сохранение
    saveBtn.addEventListener('click', () => {
      if (currentImageBase64) {
        saveImage(currentImageBase64, 'flowers.png');
      }
    });

    // Новое изображение
    newBtn.addEventListener('click', () => {
      result.style.display = 'none';
      generateBtn.style.display = 'block';
      promptInput.value = '';
      currentImageBase64 = null;
    });
  </script>
</body>
</html>
