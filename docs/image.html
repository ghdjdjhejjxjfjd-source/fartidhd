<script>
    // ПРОСТОЙ ТЕСТ - создадим карточку вручную
    window.onload = function() {
        alert('Страница загружена!');
        
        const grid = document.getElementById('modesGrid');
        if (grid) {
            alert('Элемент modesGrid найден!');
            
            // Создаем тестовую карточку
            const testDiv = document.createElement('div');
            testDiv.style.cssText = `
                background: red;
                color: white;
                padding: 20px;
                margin: 10px;
                border-radius: 10px;
                text-align: center;
                font-size: 18px;
            `;
            testDiv.textContent = 'ТЕСТОВАЯ КАРТОЧКА (красная)';
            
            grid.appendChild(testDiv);
            alert('Карточка добавлена!');
        } else {
            alert('Элемент modesGrid НЕ НАЙДЕН!');
        }
    };
</script>
