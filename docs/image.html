<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Генерация картинки</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
        
        document.body.style.overflow = 'hidden';
        const container = document.querySelector('.container');
        if (container) {
          container.style.overflowY = 'auto';
          container.style.webkitOverflowScrolling = 'touch';
        }
      }
    })();
  </script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- ПЛАТФОРМА -->
  <script>
    (function(){
      const KEY = "miniapp_platform_v1";
      function getPlatform(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("platform");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "ios"; }catch(e){ return "ios"; }
      }
      const platform = getPlatform();
      if (platform === 'android') {
        document.documentElement.classList.add('android-mode');
      }
    })();
  </script>

      --accent2: #3496ff;

      --caret-color: #ffffff;

    :root[data-theme="light"] { 
      --bg-top: #e8edf5;
      --bg-mid: #d9e0eb;
      --bg-bot: #cad1de;
      --accent1: #3a8cff;
      --accent2: #1a6cff;
      --text: #2c3e50;
      --subtext: #4a5a6a;
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-border: rgba(0, 0, 0, 0.1);
      --input-bg: rgba(255, 255, 255, 0.95);
      --btn-bg: rgba(58, 140, 255, 0.1);
      --star-color: #2c3e50;
      --header-text: #2c3e50;
      --caret-color: #3a8cff;
    }

    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bot) 100%);
      background-attachment: fixed;
    }

    /* КНОПКА ТЕМЫ */
    .themePill {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      right: 10px;
      z-index: 10000;
      padding: 10px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent1) 16%, white 8%) 0%, rgba(255,255,255,.08) 100%);
      border: 1px solid color-mix(in srgb, var(--accent1) 24%, rgba(255,255,255,.12));
      color: var(--text);
      backdrop-filter: blur(12px) saturate(115%);
      -webkit-backdrop-filter: blur(12px) saturate(115%);
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
    }

    :root[data-theme="light"] .themePill {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(12px);
      border: 1.5px solid #c0c0c0;
      color: #3a4a5a;
    }

    .themePill:active {
      transform: scale(0.98);
    }

    /* Оверлей темы */
    .themeOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,.34);
      display: none;
    }
    .themeOverlay.show {
      display: block !important;
    }
    .themeSheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      border-radius: 18px;
      background: rgba(24, 31, 40, .97);
      border: 1.5px solid rgba(255, 255, 255, .10);
      backdrop-filter: blur(16px) saturate(118%);
      -webkit-backdrop-filter: blur(16px) saturate(118%);
      overflow: hidden;
      transform: translateY(110%);
      opacity: 0;
      transition: transform .35s cubic-bezier(.2,.8,.2,1), opacity .25s ease;
    }
    .themeOverlay.show .themeSheet {
      transform: translateY(0);
      opacity: 1;
    }
    .themeSheetHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px;
      border-bottom: 1.5px solid rgba(255, 255, 255, .10);
    }
    .themeSheetTitle {
      font-weight: 800;
      color: #f7fbff;
    }
    .themeClose {
      border: 0;
      background: rgba(255, 255, 255, .08);
      color: #f7fbff;
      border: 1.5px solid rgba(255, 255, 255, .10);
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 800;
      cursor: pointer;
    }
    .themeList {
      max-height: 40vh;
      overflow-y: auto;
    }
    .themeItem {
      width: 100%;
      text-align: left;
      padding: 14px;
      border: 0;
      border-bottom: 1.5px solid rgba(255, 255, 255, .10);
      background: transparent;
      color: #f7fbff;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .themeItem:last-child {
      border-bottom: none;
    }
    .themeItem .check {
      opacity: 0;
      transform: scale(.9);
      transition: .15s ease;
      color: #5aaeff;
    }
    .themeItem.selected .check {
      opacity: 1;
      transform: scale(1);
    }

    :root[data-theme="light"] .themeSheet {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(0, 0, 0, 0.1);
    }
    :root[data-theme="light"] .themeSheetTitle,
    :root[data-theme="light"] .themeItem {
      color: #3a4a5a;
    }
    :root[data-theme="light"] .themeItem .check {
      color: #3a8cff;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: transparent;
      backdrop-filter: none;
      height: 60px;
    }

    .back-btn {
      color: var(--header-text);
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
      color: var(--header-text);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin: 0 12px;
    }

    .spacer { width: 40px; }

    .container {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 30px;
      padding: 2px;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: snakeMove 3s linear infinite;
      background-size: 300% 100%;
      opacity: 0.7;
      pointer-events: none;
    }

    @keyframes snakeMove {
      0% { background-position: 0% 0; }
      100% { background-position: 300% 0; }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon { font-size: 32px; }
    .card-title { font-size: 22px; font-weight: 700; color: var(--text); }

    .star-badge {
      font-size: 16px;
      color: var(--star-color);
      background: rgba(255,215,0,0.15);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.3);
    }

    .card-desc {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .input-group { margin-bottom: 20px; }
    .input-label { font-size: 14px; color: var(--subtext); margin-bottom: 8px; display: block; }
    .input-wrapper { display: flex; align-items: center; gap: 8px; }

    .text-input {
      flex: 1;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      caret-color: var(--caret-color);
    }

    .text-input:focus { outline: none; border-color: var(--accent1); }
    .text-input::placeholder { color: var(--subtext); opacity: 0.7; }

    .clear-input {
      background: var(--btn-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 50px;
      height: 50px;
      border-radius: 20px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .size-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .size-btn {
      flex: 1;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .size-btn.active {
      background: var(--accent1);
      border-color: var(--accent1);
      color: white;
    }

    .generate-btn {
      width: 100%;
      padding: 18px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin: 20px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    }

    .generate-btn:active { transform: scale(0.98); }

    .result { display: none; margin-top: 20px; }
    .result-image {
      width: 100%;
      border-radius: 24px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
      margin-bottom: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .action-buttons { display: flex; gap: 12px; }
    .action-btn {
      flex: 1;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--btn-bg);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .action-btn.primary {
      background: linear-gradient(180deg, var(--accent1) 0%, var(--accent2) 100%);
      border: none;
      color: white;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent1);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: white; font-size: 18px; font-weight: 600; }

    html.android-mode .card::before { display: none !important; }
    html.android-mode .header { background: transparent !important; backdrop-filter: none !important; }
    html.android-mode .back-btn, html.android-mode .title { background: transparent !important; backdrop-filter: none !important; border: none !important; }
    html.android-mode .card { backdrop-filter: none !important; }
    html.android-mode .themePill { backdrop-filter: none !important; }
  </style>
</head>

        cardDesc: "Écris ce que tu veux voir — L'IA dessinera dans n'importe quel style",
        promptLabel: "Ton prompt",
        promptPlaceholder: "ex: beau coucher de soleil dans les montagnes",
        sizeSquare: "1:1",
        generate: "Générer",
        save: "Enregistrer",
        repeat: "Répéter",
        loading: "Génération...",
        sending: "📤 Envoi au bot...",
        clear: "Effacer",
        insufficientStars: "❌ Pas assez d'étoiles. 10⭐ nécessaires",
        error: "Erreur de génération",
        saved: "✅ Envoyé au bot",
        theme: "Couleur"
      }
    };

    function getLang() {
      const url = new URL(window.location.href);
      const urlLang = url.searchParams.get("lang");
      if (urlLang) {
        try { localStorage.setItem("miniapp_lang_v1", urlLang); } catch(e) {}
        return urlLang;
      }
      try { 
        const stored = localStorage.getItem("miniapp_lang_v1");
        if (stored) return stored;
      } catch(e) {}
      return "ru";
    }

    function getSavedTheme() {
      try{ return localStorage.getItem(STORAGE_THEME) || "blue"; } catch(e){ return "blue"; }
    }

    function saveTheme(theme) {
      try{ localStorage.setItem(STORAGE_THEME, theme); } catch(e){}
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme || "blue");
    }

    function getThemeLabel(themeCode, lang) {
      const theme = THEMES.find(t => t.code === themeCode);
      if (!theme) return themeCode;
      return theme.label[lang] || theme.label.ru || themeCode;
    }

    function updateUILanguage() {
      const lang = getLang();
      const t = I18N[lang] || I18N.ru;
      document.getElementById('title').textContent = t.title;
      document.getElementById('cardTitle').textContent = t.cardTitle;
      document.getElementById('cardDesc').textContent = t.cardDesc;
      document.getElementById('promptLabel').textContent = t.promptLabel;
      document.getElementById('promptInput').placeholder = t.promptPlaceholder;
      document.getElementById('sizeSquare').textContent = t.sizeSquare;
      document.getElementById('generateText').textContent = t.generate;
      document.getElementById('saveText').textContent = t.save;
      document.getElementById('repeatText').textContent = t.repeat;
      document.getElementById('loadingText').textContent = t.loading;
      document.getElementById('clearInputBtn').title = t.clear;
      document.getElementById('themeSheetTitle').textContent = t.theme;
      
      const currentTheme = getSavedTheme();
      document.getElementById('themeBtnText').textContent = `${t.theme}: ${getThemeLabel(currentTheme, lang)}`;
      
      updateThemeList(lang);
    }

    function updateThemeList(lang) {
      const themeList = document.getElementById('themeList');
      if (!themeList) return;
      const items = themeList.querySelectorAll('.themeItem');
      items.forEach(item => {
        const code = item.getAttribute('data-theme');
        const labelSpan = item.querySelector('.theme-label');
        if (labelSpan) labelSpan.textContent = getThemeLabel(code, lang);
      });
    }

    function paintSelectedTheme(theme) {
      const themeList = document.getElementById('themeList');
      if (!themeList) return;
      const items = themeList.querySelectorAll(".themeItem");
      items.forEach(btn => {
        const code = btn.getAttribute("data-theme");
        btn.classList.toggle("selected", code === theme);
      });
    }

    function buildThemeList() {
      const themeList = document.getElementById('themeList');
      if (!themeList) return;
      themeList.innerHTML = "";
      THEMES.forEach(theme => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "themeItem";
        btn.setAttribute("data-theme", theme.code);
        const currentLang = getLang();
        const labelText = theme.label[currentLang] || theme.label.ru;
        btn.innerHTML = `<span class="theme-label">${labelText}</span><span class="check">✓</span>`;
        btn.addEventListener("click", () => setTheme(theme.code));
        themeList.appendChild(btn);
      });
    }

    function setTheme(theme) {
      applyTheme(theme);
      saveTheme(theme);
      paintSelectedTheme(theme);
      const currentLang = getLang();
      const t = I18N[currentLang] || I18N.ru;
      document.getElementById('themeBtnText').textContent = `${t.theme}: ${getThemeLabel(theme, currentLang)}`;
      closeTheme();
    }

    function openTheme() {
      const overlay = document.getElementById('themeOverlay');
      if (overlay) {
        overlay.classList.add("show");
      }
    }

    function closeTheme() {
      const overlay = document.getElementById('themeOverlay');
      if (overlay) {
        overlay.classList.remove("show");
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      buildThemeList();
      const savedTheme = getSavedTheme();
      applyTheme(savedTheme);
      paintSelectedTheme(savedTheme);
      updateUILanguage();
      
      const themeBtn = document.getElementById('themeBtn');
      const themeClose = document.getElementById('themeClose');
      const themeOverlay = document.getElementById('themeOverlay');
      
      if (themeBtn) themeBtn.addEventListener('click', openTheme);
      if (themeClose) themeClose.addEventListener('click', closeTheme);
      if (themeOverlay) themeOverlay.addEventListener('click', (e) => {
        if (e.target === themeOverlay) closeTheme();
      });
      
      // Закрытие клавиатуры при тапе вне поля ввода
      const container = document.querySelector('.container');
      const promptInput = document.getElementById('promptInput');
      
      container.addEventListener('click', (e) => {
        if (promptInput && promptInput !== e.target && !promptInput.contains(e.target)) {
          promptInput.blur();
        }
      });
      
      document.body.addEventListener('click', (e) => {
        if (promptInput && promptInput !== e.target && !promptInput.contains(e.target)) {
          promptInput.blur();
        }
      });
    });

    window.addEventListener('languageChanged', updateUILanguage);

    function getUser() {
      const tg = window.Telegram?.WebApp;
      if (!tg || !tg.initDataUnsafe?.user) return null;
      return tg.initDataUnsafe.user;
    }

    async function generateImage(prompt) {
      const user = getUser();
      if (!user) {
        alert("Ошибка: не удалось получить данные пользователя");
        return null;
      }
      const t = I18N[getLang()] || I18N.ru;
      document.getElementById('loadingText').textContent = t.loading;
      document.getElementById('loadingOverlay').style.display = 'flex';
      try {
        const formData = new FormData();
        formData.append('tg_user_id', user.id);
        formData.append('tg_username', user.username || '');
        formData.append('tg_first_name', user.first_name || '');
        formData.append('prompt', prompt);
        formData.append('mode', 'txt2img');
        formData.append('width', '1024');
        formData.append('height', '1024');
        
        const response = await fetch(`${API_BASE}/api/image`, { method: 'POST', body: formData });
        const data = await response.json();
        
        if (!response.ok) {
          if (data.error === 'insufficient_stars') {
            alert(t.insufficientStars);
          } else {
            throw new Error(data.message || 'Ошибка генерации');
          }
          return null;
        }
        
        return data.image_base64;
      } catch (error) {
        console.error("Generation error:", error);
        alert(t.error + ': ' + error.message);
        return null;
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    async function sendToBot(imageBase64) {
      const t = I18N[getLang()] || I18N.ru;
      const user = getUser();
      if (!user) {
        alert("Ошибка: пользователь не найден");
        return;
      }
      try {
        document.getElementById('loadingText').textContent = t.sending;
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        const base64Data = imageBase64.split(',')[1];
        const binaryData = atob(base64Data);
        const bytes = new Uint8Array(binaryData.length);
        for (let i = 0; i < binaryData.length; i++) {
          bytes[i] = binaryData.charCodeAt(i);
        }
        const blob = new Blob([bytes], { type: 'image/png' });
        
        const formData = new FormData();
        formData.append('user_id', user.id);
        formData.append('image', blob, `image_${Date.now()}.png`);
        formData.append('filename', `image_${Date.now()}.png`);
        
        const response = await fetch(`${API_BASE}/api/send-photo`, { method: 'POST', body: formData });
        const data = await response.json();
        if (response.ok && data.success) {
          alert(t.saved);
        } else {
          alert("Ошибка при отправке в бота");
        }
      } catch (e) {
        console.error("Send to bot error:", e);
        alert("Ошибка при отправке в бота");
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const resultImg = document.getElementById('resultImg');
    const saveBtn = document.getElementById('saveBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const clearInputBtn = document.getElementById('clearInputBtn');
    let currentImageBase64 = null;

    clearInputBtn.addEventListener('click', () => {
      promptInput.value = '';
      promptInput.focus();
    });

    generateBtn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        alert('Введите промпт');
        return;
      }
      const fullPrompt = `${prompt}, high quality, detailed, 8k, masterpiece`;
      const imageBase64 = await generateImage(fullPrompt);
      if (imageBase64) {
        currentImageBase64 = imageBase64;
        resultImg.src = imageBase64;
        result.style.display = 'block';
        generateBtn.style.display = 'none';
      }
    });

    saveBtn.addEventListener('click', () => {
      if (currentImageBase64) {
        sendToBot(currentImageBase64);
      }
    });

    repeatBtn.addEventListener('click', () => {
      result.style.display = 'none';
      generateBtn.style.display = 'flex';
    });
  </script>
</body>
</html>
