<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Текст с фото</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- TESSERACT -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    :root[data-theme="blue"] { --accent: #3aa0ff; }
    :root[data-theme="black"] { --accent: #6aa7ff; }
    :root[data-theme="purple"] { --accent: #b98cff; }
    :root[data-theme="green"] { --accent: #2fd6a3; }
    :root[data-theme="gray"] { --accent: #7fb2ff; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .container {
      padding: 80px 16px 20px;
      min-height: 100vh;
    }

    .upload-area {
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
    }

    .result-container {
      display: none;
    }

    .image-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .preview-image {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
    }

    .text-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      line-height: 1.6;
      color: #00ff00;
      background: #1a1a1a;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn-group .btn {
      flex: 1;
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .progress {
      margin-top: 20px;
      font-size: 14px;
      color: var(--accent);
    }

    .quality-selector {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }

    .quality-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
    }

    .quality-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="title" id="title">Текст с фото</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text" id="uploadText">Выбери фото с текстом</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div class="result-container" id="resultContainer">
      <div class="image-box">
        <img class="preview-image" id="preview" src="">
      </div>

      <div class="quality-selector" id="qualitySelector">
        <button class="quality-btn active" data-quality="fast">🚀 Быстро</button>
        <button class="quality-btn" data-quality="accurate">🎯 Точно</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="scanBtn">🔍 Распознать</button>
        <button class="btn btn-secondary" id="copyBtn" style="display: none;">📋 Копировать</button>
      </div>

      <div class="text-box" id="result"></div>

      <button class="btn btn-secondary" id="newBtn">📸 Новое фото</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingText">Распознаю текст...</div>
    <div class="progress" id="progress">0%</div>
  </div>

  <script>
    const translations = {
      ru: {
        title: "Текст с фото",
        upload: "Выбери фото с текстом",
        scan: "🔍 Распознать",
        copy: "📋 Копировать",
        new: "📸 Новое фото",
        loading: "Распознаю текст...",
        fast: "🚀 Быстро",
        accurate: "🎯 Точно"
      },
      en: {
        title: "Text from Image",
        upload: "Select photo with text",
        scan: "🔍 Scan",
        copy: "📋 Copy",
        new: "📸 New Photo",
        loading: "Scanning...",
        fast: "🚀 Fast",
        accurate: "🎯 Accurate"
      }
    };

    function getLang() {
      const urlParams = new URLSearchParams(window.location.search);
      const lang = urlParams.get('lang');
      if (lang) return lang;
      try { return localStorage.getItem('miniapp_lang_v1') || 'ru'; } 
      catch(e) { return 'ru'; }
    }

    const lang = getLang();
    const t = translations[lang] || translations.ru;

    document.getElementById('title').textContent = t.title;
    document.getElementById('uploadText').textContent = t.upload;
    document.getElementById('scanBtn').textContent = t.scan;
    document.getElementById('copyBtn').textContent = t.copy;
    document.getElementById('newBtn').textContent = t.new;
    document.getElementById('loadingText').textContent = t.loading;

    const qualityBtns = document.querySelectorAll('.quality-btn');
    qualityBtns[0].textContent = t.fast;
    qualityBtns[1].textContent = t.accurate;

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const preview = document.getElementById('preview');
    const scanBtn = document.getElementById('scanBtn');
    const copyBtn = document.getElementById('copyBtn');
    const newBtn = document.getElementById('newBtn');
    const result = document.getElementById('result');
    const loading = document.getElementById('loading');
    const progress = document.getElementById('progress');

    let currentFile = null;
    let quality = 'fast';

    qualityBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        qualityBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        quality = btn.dataset.quality;
      });
    });

    // Функция для улучшения изображения
    function preprocessImage(img, mode) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      // Увеличиваем размер для лучшего распознавания
      let scale = 2;
      if (mode === 'accurate') scale = 3;
      
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      
      // Рисуем с увеличением
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      // Получаем данные пикселей
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      // Улучшаем контраст и убираем шум
      for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];
        
        // Конвертируем в градации серого
        let gray = 0.3 * r + 0.6 * g + 0.1 * b;
        
        // Увеличиваем контраст
        if (mode === 'accurate') {
          gray = gray > 128 ? 255 : 0;
        } else {
          gray = gray > 128 ? 255 : 0;
        }
        
        data[i] = gray;
        data[i + 1] = gray;
        data[i + 2] = gray;
        
        // Убираем шум
        if (mode === 'accurate') {
          data[i + 3] = 255; // полная непрозрачность
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
      return canvas;
    }

    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        currentFile = file;
        
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
          uploadArea.style.display = 'none';
          resultContainer.style.display = 'block';
          result.textContent = '';
          copyBtn.style.display = 'none';
        };
        reader.readAsDataURL(file);
      }
    });

    scanBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      loading.style.display = 'flex';
      scanBtn.disabled = true;
      progress.textContent = '0%';

      try {
        // Создаем изображение
        const img = new Image();
        img.src = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.readAsDataURL(currentFile);
        });

        await new Promise(resolve => { img.onload = resolve; });

        // Улучшаем изображение
        const processedCanvas = preprocessImage(img, quality);
        
        // Конвертируем в blob
        const processedBlob = await new Promise(resolve => {
          processedCanvas.toBlob(resolve, 'image/png');
        });

        // Настройки Tesseract
        const worker = await Tesseract.createWorker({
          logger: m => {
            if (m.status === 'recognizing text') {
              progress.textContent = Math.round(m.progress * 100) + '%';
            }
          }
        });

        await worker.loadLanguage('rus+eng');
        await worker.initialize('rus+eng');
        
        if (quality === 'accurate') {
          await worker.setParameters({
            tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz.,!?-:; ',
            preserve_interword_spaces: '1',
          });
        }
        
        const { data: { text } } = await worker.recognize(processedBlob);
        
        // Чистим текст от лишних символов
        const cleanText = text.replace(/[^\w\s.,!?;:()[\]{}\-]/g, '');
        
        result.textContent = cleanText || 'Текст не найден';
        copyBtn.style.display = 'block';
        
        await worker.terminate();

      } catch (error) {
        console.error(error);
        result.textContent = 'Ошибка распознавания';
      } finally {
        loading.style.display = 'none';
        scanBtn.disabled = false;
      }
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(result.textContent);
      copyBtn.textContent = '✓ Готово';
      setTimeout(() => {
        copyBtn.textContent = t.copy;
      }, 2000);
    });

    newBtn.addEventListener('click', () => {
      uploadArea.style.display = 'block';
      resultContainer.style.display = 'none';
      fileInput.value = '';
      currentFile = null;
    });

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
