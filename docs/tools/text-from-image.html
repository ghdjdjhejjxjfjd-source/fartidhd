<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Текст с фото</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f18; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
    .tool-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(8,16,30,.55); backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .tool-back {
      color: #fff; text-decoration: none; font-size: 20px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.1); border-radius: 18px;
    }
    .tool-title { font-weight: 700; font-size: 18px; flex: 1; text-align: center; color: #fff; }
    .tool-spacer { width: 36px; }
    .tool-container { padding: 80px 16px 20px; min-height: 100vh; }
    .upload-area {
      background: rgba(255,255,255,.05); border: 2px dashed rgba(255,255,255,.2);
      border-radius: 24px; padding: 40px 20px; text-align: center; cursor: pointer;
      margin: 20px 0; transition: all 0.2s;
    }
    .upload-area:hover { background: rgba(255,255,255,.08); border-color: #3aa0ff; }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-text { font-size: 16px; color: rgba(255,255,255,.7); }
    .result-area {
      background: rgba(255,255,255,.05); border-radius: 16px; padding: 20px;
      margin-top: 20px; display: none;
    }
    .result-text {
      background: rgba(0,0,0,.3); border-radius: 12px; padding: 16px;
      font-size: 16px; line-height: 1.5; margin-bottom: 16px;
      white-space: pre-wrap; word-break: break-word;
    }
    .process-btn, .copy-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      font-size: 16px; font-weight: 700; margin: 8px 0; cursor: pointer;
    }
    .process-btn {
      background: linear-gradient(180deg, #3aa0ff 0%, #0a84ff 100%);
      color: white;
    }
    .copy-btn {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: white; display: none;
    }
    .loading {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.7); backdrop-filter: blur(10px);
      flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    }
    .spinner {
      width: 50px; height: 50px; border: 3px solid rgba(255,255,255,.3);
      border-top-color: #3aa0ff; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    :root[data-theme="purple"] .process-btn { background: linear-gradient(180deg, #b98cff 0%, #7a5cff 100%); }
    :root[data-theme="green"] .process-btn { background: linear-gradient(180deg, #2fd6a3 0%, #11a87b 100%); }
    :root[data-theme="black"] .process-btn { background: linear-gradient(180deg, #6aa7ff 0%, #2f7bff 100%); }
  </style>
</head>
<body>
  <div class="tool-header">
    <a href="../index.html" class="tool-back">←</a>
    <div class="tool-title" id="toolTitle">Текст с фото</div>
    <div class="tool-spacer"></div>
  </div>
  <div class="tool-container">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text" id="uploadText">Нажми чтобы выбрать фото с текстом</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
    <button class="process-btn" id="processBtn" style="display: none;">🔍 Распознать текст</button>
    <div class="result-area" id="resultArea">
      <div class="result-text" id="resultText"></div>
      <button class="copy-btn" id="copyBtn">📋 Копировать</button>
    </div>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Распознавание...</div>
  </div>
  <script>
    const I18N = {
      ru: { title: "Текст с фото", upload: "Нажми чтобы выбрать фото с текстом", process: "🔍 Распознать текст", loading: "Распознавание...", copy: "📋 Копировать" },
      kk: { title: "Фотонан мәтін", upload: "Мәтіні бар фото таңдау", process: "🔍 Мәтінді тану", loading: "Танылуда...", copy: "📋 Көшіру" },
      en: { title: "Text from Image", upload: "Select photo with text", process: "🔍 Extract Text", loading: "Processing...", copy: "📋 Copy" },
      tr: { title: "Fotodan yazı", upload: "Metinli fotoğraf seç", process: "🔍 Metni çıkar", loading: "İşleniyor...", copy: "📋 Kopyala" }
    };
    const lang = (new URL(window.location.href)).searchParams.get("lang") || localStorage.getItem("miniapp_lang_v1") || "ru";
    const t = I18N[lang] || I18N.ru;
    document.getElementById('toolTitle').textContent = t.title;
    document.getElementById('uploadText').textContent = t.upload;
    document.getElementById('processBtn').textContent = t.process;
    document.querySelector('.loading-text').textContent = t.loading;
    document.getElementById('copyBtn').textContent = t.copy;
    
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('resultArea');
    const resultText = document.getElementById('resultText');
    const copyBtn = document.getElementById('copyBtn');
    
    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) processBtn.style.display = 'block'; });
    
    processBtn.addEventListener('click', async () => {
      loading.style.display = 'flex';
      processBtn.disabled = true;
      setTimeout(() => {
        loading.style.display = 'none';
        processBtn.disabled = false;
        resultArea.style.display = 'block';
        resultText.textContent = 'Это пример распознанного текста. Функция будет добавлена позже.';
        copyBtn.style.display = 'block';
      }, 2000);
    });
    
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(resultText.textContent);
      alert('Скопировано!');
    });
  </script>
</body>
</html>
