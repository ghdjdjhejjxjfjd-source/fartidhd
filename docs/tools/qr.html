<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>QR коды</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f18; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
    .tool-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(8,16,30,.55); backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .tool-back {
      color: #fff; text-decoration: none; font-size: 20px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.1); border-radius: 18px;
    }
    .tool-title { font-weight: 700; font-size: 18px; flex: 1; text-align: center; color: #fff; }
    .tool-spacer { width: 36px; }
    .tool-container { padding: 80px 16px 20px; min-height: 100vh; }
    .input-area {
      background: rgba(255,255,255,.05); border-radius: 16px; padding: 20px;
      margin: 20px 0;
    }
    .qr-input {
      width: 100%; padding: 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1);
      color: white; font-size: 16px; margin-bottom: 16px;
    }
    .qr-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      background: linear-gradient(180deg, #3aa0ff 0%, #0a84ff 100%);
      color: white; margin-bottom: 20px;
    }
    .qr-result {
      display: none; text-align: center;
    }
    #qrCanvas { max-width: 100%; border-radius: 16px; }
    .save-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1); color: white; font-size: 16px;
      margin-top: 16px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="tool-header">
    <a href="../index.html" class="tool-back">←</a>
    <div class="tool-title" id="toolTitle">QR коды</div>
    <div class="tool-spacer"></div>
  </div>
  <div class="tool-container">
    <div class="input-area">
      <input type="text" class="qr-input" id="qrText" placeholder="Введи текст или ссылку">
      <button class="qr-btn" id="generateBtn">🔳 Создать QR код</button>
      <div class="qr-result" id="qrResult">
        <canvas id="qrCanvas"></canvas>
        <button class="save-btn" id="saveBtn">💾 Сохранить</button>
      </div>
    </div>
  </div>
  <script>
    const I18N = {
      ru: { title: "QR коды", placeholder: "Введи текст или ссылку", generate: "🔳 Создать QR код", save: "💾 Сохранить" },
      en: { title: "QR Codes", placeholder: "Enter text or link", generate: "🔳 Generate QR code", save: "💾 Save" }
    };
    const lang = (new URL(window.location.href)).searchParams.get("lang") || localStorage.getItem("miniapp_lang_v1") || "ru";
    const t = I18N[lang] || I18N.ru;
    document.getElementById('toolTitle').textContent = t.title;
    document.getElementById('qrText').placeholder = t.placeholder;
    document.getElementById('generateBtn').textContent = t.generate;
    document.getElementById('saveBtn').textContent = t.save;
    
    const generateBtn = document.getElementById('generateBtn');
    const qrText = document.getElementById('qrText');
    const qrResult = document.getElementById('qrResult');
    const qrCanvas = document.getElementById('qrCanvas');
    
    generateBtn.addEventListener('click', () => {
      if (!qrText.value.trim()) {
        alert('Введите текст');
        return;
      }
      
      QRCode.toCanvas(qrCanvas, qrText.value, { width: 300 }, (err) => {
        if (err) {
          alert('Ошибка создания QR');
        } else {
          qrResult.style.display = 'block';
        }
      });
    });
    
    document.getElementById('saveBtn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = qrCanvas.toDataURL();
      link.click();
    });
  </script>
</body>
</html>
