<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>QR Конструктор</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: #0b0f18; 
      color: white; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      min-height: 100vh; 
    }

    :root[data-theme="blue"] { --accent: #3aa0ff; --accent2: #0a84ff; }
    :root[data-theme="black"] { --accent: #6aa7ff; --accent2: #2f7bff; }
    :root[data-theme="light"] { --accent: #3a8cff; --accent2: #1a6cff; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .container {
      padding: 80px 16px 20px;
      min-height: 100vh;
    }

    /* Основной ввод */
    .main-input {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      display: block;
    }

    .text-input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
      transition: all 0.2s;
    }

    .text-input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,255,255,0.15);
    }

    /* Кнопка загрузки фото */
    .upload-btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 2px dashed rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .upload-btn:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.1);
    }

    .upload-icon {
      font-size: 24px;
    }

    /* Секция с фото */
    .photo-section {
      display: none;
      margin-bottom: 20px;
    }

    .image-preview {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 10px;
    }

    .remove-photo {
      text-align: right;
      margin-bottom: 10px;
    }

    .remove-photo-btn {
      background: none;
      border: none;
      color: #ff4444;
      font-size: 14px;
      cursor: pointer;
      padding: 5px 10px;
    }

    /* Настройки расположения */
    .layout-settings {
      display: none;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .settings-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .layout-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .layout-btn {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .layout-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .layout-icon {
      font-size: 24px;
    }

    /* Стили текста */
    .text-style-options {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .style-btn {
      flex: 1;
      min-width: 70px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .style-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Размер шрифта */
    .font-size-control {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .font-size-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      min-width: 60px;
      text-align: center;
    }

    .font-size-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
    }

    .font-size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    /* Отступы */
    .spacing-options {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .spacing-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .spacing-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Предпросмотр страницы */
    .page-preview {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .preview-title {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .preview-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .preview-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .preview-text-content {
      padding: 20px;
      color: #1a2634;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      word-wrap: break-word;
    }

    /* Кнопка генерации */
    .generate-btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
      margin: 20px 0;
      transition: all 0.2s;
    }

    .generate-btn:active {
      transform: scale(0.98);
    }

    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Индикатор загрузки */
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      color: white;
    }

    /* QR результат */
    .qr-section {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .qr-canvas {
      max-width: 100%;
      border-radius: 16px;
      background: white;
      padding: 16px;
    }

    .qr-link {
      margin: 12px 0;
      font-size: 12px;
      color: var(--accent);
      word-break: break-all;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="title" id="title">QR Конструктор</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <!-- Индикатор загрузки -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Создаю QR код...</div>
    </div>

    <!-- Основной блок -->
    <div id="mainBlock">
      <!-- Поле ввода текста/ссылки -->
      <div class="main-input">
        <div class="input-group">
          <label class="input-label" id="textLabel">Текст или ссылка</label>
          <input type="text" class="text-input" id="textInput" placeholder="https:// или любой текст" value="https://t.me/InstaGroqBot">
        </div>

        <!-- Кнопка загрузки фото -->
        <button class="upload-btn" id="uploadBtn">
          <span class="upload-icon">📸</span>
          <span id="uploadBtnText">Загрузить фото</span>
        </button>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>

      <!-- Секция с фото (появляется после загрузки) -->
      <div class="photo-section" id="photoSection">
        <div class="remove-photo">
          <button class="remove-photo-btn" id="removePhotoBtn">✕ Удалить фото</button>
        </div>
        <img class="image-preview" id="imagePreview" src="">
      </div>

      <!-- Настройки расположения (появляются при наличии фото и текста) -->
      <div class="layout-settings" id="layoutSettings">
        <div class="settings-title" id="layoutTitle">🎯 Расположение</div>
        
        <div class="layout-options">
          <button class="layout-btn active" data-layout="top">
            <span class="layout-icon">⬆️</span>
            <span id="layoutTop">Текст сверху</span>
          </button>
          <button class="layout-btn" data-layout="bottom">
            <span class="layout-icon">⬇️</span>
            <span id="layoutBottom">Текст снизу</span>
          </button>
          <button class="layout-btn" data-layout="left">
            <span class="layout-icon">⬅️</span>
            <span id="layoutLeft">Текст слева</span>
          </button>
          <button class="layout-btn" data-layout="right">
            <span class="layout-icon">➡️</span>
            <span id="layoutRight">Текст справа</span>
          </button>
        </div>

        <div class="settings-title" id="styleTitle">🎨 Стиль текста</div>
        <div class="text-style-options">
          <button class="style-btn active" data-style="normal">Обычный</button>
          <button class="style-btn" data-style="bold">Жирный</button>
          <button class="style-btn" data-style="italic">Курсив</button>
        </div>

        <div class="settings-title" id="fontSizeTitle">🔤 Размер шрифта</div>
        <div class="font-size-control">
          <span class="font-size-value" id="fontSizeValue">16px</span>
          <input type="range" class="font-size-slider" id="fontSizeSlider" min="12" max="32" value="16">
        </div>

        <div class="settings-title" id="spacingTitle">📏 Отступы</div>
        <div class="spacing-options">
          <button class="spacing-btn active" data-spacing="small">Маленькие</button>
          <button class="spacing-btn" data-spacing="medium">Средние</button>
          <button class="spacing-btn" data-spacing="large">Большие</button>
        </div>
      </div>

      <!-- Предпросмотр страницы -->
      <div class="page-preview" id="pagePreview">
        <div class="preview-title" id="previewTitle">👀 Предпросмотр страницы</div>
        <div class="preview-card" id="previewCard">
          <img class="preview-image" id="previewImage" src="" style="display: none;">
          <div class="preview-text-content" id="previewText">https://t.me/InstaGroqBot</div>
        </div>
      </div>

      <!-- Кнопка создания QR -->
      <button class="generate-btn" id="generateBtn">🔳 Создать QR код</button>
    </div>

    <!-- QR результат -->
    <div class="qr-section" id="qrSection">
      <canvas class="qr-canvas" id="qrCanvas"></canvas>
      <div class="qr-link" id="qrLink"></div>
      
      <div class="btn-group">
        <button class="btn btn-primary" id="saveQrBtn">💾 Сохранить QR</button>
        <button class="btn btn-secondary" id="shareQrBtn">📤 Поделиться</button>
      </div>
      
      <button class="btn btn-secondary" id="newQrBtn">✨ Создать новый</button>
    </div>
  </div>

  <script>
    // ===== ПЕРЕВОДЫ =====
    const TRANSLATIONS = {
      ru: {
        title: "QR Конструктор",
        textLabel: "Текст или ссылка",
        uploadBtn: "Загрузить фото",
        layoutTitle: "🎯 Расположение",
        layoutTop: "Текст сверху",
        layoutBottom: "Текст снизу",
        layoutLeft: "Текст слева",
        layoutRight: "Текст справа",
        styleTitle: "🎨 Стиль текста",
        fontSizeTitle: "🔤 Размер шрифта",
        spacingTitle: "📏 Отступы",
        spacingSmall: "Маленькие",
        spacingMedium: "Средние",
        spacingLarge: "Большие",
        previewTitle: "👀 Предпросмотр страницы",
        generate: "🔳 Создать QR код",
        loading: "Создаю QR код...",
        saveQr: "💾 Сохранить QR",
        shareQr: "📤 Поделиться",
        newQr: "✨ Создать новый"
      },
      en: {
        title: "QR Constructor",
        textLabel: "Text or link",
        uploadBtn: "Upload photo",
        layoutTitle: "🎯 Layout",
        layoutTop: "Text on top",
        layoutBottom: "Text on bottom",
        layoutLeft: "Text on left",
        layoutRight: "Text on right",
        styleTitle: "🎨 Text style",
        fontSizeTitle: "🔤 Font size",
        spacingTitle: "📏 Spacing",
        spacingSmall: "Small",
        spacingMedium: "Medium",
        spacingLarge: "Large",
        previewTitle: "👀 Page preview",
        generate: "🔳 Generate QR",
        loading: "Generating QR...",
        saveQr: "💾 Save QR",
        shareQr: "📤 Share",
        newQr: "✨ Create new"
      }
    };

    function getLang() {
      const url = new URL(window.location.href);
      const qp = url.searchParams.get("lang");
      if (qp) return qp;
      try { return localStorage.getItem("miniapp_lang_v1") || "ru"; } 
      catch(e) { return "ru"; }
    }

    const lang = getLang();
    const t = TRANSLATIONS[lang] || TRANSLATIONS.ru;

    // Применяем переводы
    document.getElementById('title').textContent = t.title;
    document.getElementById('textLabel').textContent = t.textLabel;
    document.getElementById('uploadBtnText').textContent = t.uploadBtn;
    document.getElementById('layoutTitle').textContent = t.layoutTitle;
    document.getElementById('layoutTop').textContent = t.layoutTop;
    document.getElementById('layoutBottom').textContent = t.layoutBottom;
    document.getElementById('layoutLeft').textContent = t.layoutLeft;
    document.getElementById('layoutRight').textContent = t.layoutRight;
    document.getElementById('styleTitle').textContent = t.styleTitle;
    document.getElementById('fontSizeTitle').textContent = t.fontSizeTitle;
    document.getElementById('spacingTitle').textContent = t.spacingTitle;
    document.querySelector('[data-spacing="small"]').textContent = t.spacingSmall;
    document.querySelector('[data-spacing="medium"]').textContent = t.spacingMedium;
    document.querySelector('[data-spacing="large"]').textContent = t.spacingLarge;
    document.getElementById('previewTitle').textContent = t.previewTitle;
    document.getElementById('generateBtn').textContent = t.generate;
    document.getElementById('loadingText').textContent = t.loading;
    document.getElementById('saveQrBtn').textContent = t.saveQr;
    document.getElementById('shareQrBtn').textContent = t.shareQr;
    document.getElementById('newQrBtn').textContent = t.newQr;

    // ===== ЭЛЕМЕНТЫ =====
    const textInput = document.getElementById('textInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const photoSection = document.getElementById('photoSection');
    const imagePreview = document.getElementById('imagePreview');
    const removePhotoBtn = document.getElementById('removePhotoBtn');
    const layoutSettings = document.getElementById('layoutSettings');
    const previewImage = document.getElementById('previewImage');
    const previewText = document.getElementById('previewText');
    const generateBtn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const mainBlock = document.getElementById('mainBlock');
    const qrSection = document.getElementById('qrSection');
    const qrCanvas = document.getElementById('qrCanvas');
    const qrLink = document.getElementById('qrLink');
    const saveQrBtn = document.getElementById('saveQrBtn');
    const shareQrBtn = document.getElementById('shareQrBtn');
    const newQrBtn = document.getElementById('newQrBtn');
    const fontSizeSlider = document.getElementById('fontSizeSlider');
    const fontSizeValue = document.getElementById('fontSizeValue');

    // ===== ПЕРЕМЕННЫЕ =====
    let currentImage = null;
    let currentLayout = 'top';
    let currentStyle = 'normal';
    let currentSpacing = 'small';
    let currentFontSize = 16;

    // ===== ЗАГРУЗКА ФОТО =====
    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = (e) => {
          currentImage = e.target.result;
          imagePreview.src = currentImage;
          previewImage.src = currentImage;
          previewImage.style.display = 'block';
          photoSection.style.display = 'block';
          updatePreview();
          checkLayoutSettings();
        };
        
        reader.readAsDataURL(file);
      }
    });

    // ===== УДАЛЕНИЕ ФОТО =====
    removePhotoBtn.addEventListener('click', () => {
      currentImage = null;
      photoSection.style.display = 'none';
      previewImage.style.display = 'none';
      fileInput.value = '';
      updatePreview();
      checkLayoutSettings();
    });

    // ===== ТЕКСТ =====
    textInput.addEventListener('input', (e) => {
      previewText.textContent = e.target.value || 'https://t.me/InstaGroqBot';
      checkLayoutSettings();
    });

    // ===== ПРОВЕРКА ПОКАЗА НАСТРОЕК =====
    function checkLayoutSettings() {
      if (currentImage && textInput.value.trim()) {
        layoutSettings.style.display = 'block';
      } else {
        layoutSettings.style.display = 'none';
      }
    }

    // ===== РАСПОЛОЖЕНИЕ =====
    document.querySelectorAll('.layout-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLayout = btn.dataset.layout;
        updatePreview();
      });
    });

    // ===== СТИЛЬ ТЕКСТА =====
    document.querySelectorAll('.style-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStyle = btn.dataset.style;
        updatePreview();
      });
    });

    // ===== РАЗМЕР ШРИФТА =====
    fontSizeSlider.addEventListener('input', (e) => {
      currentFontSize = e.target.value;
      fontSizeValue.textContent = currentFontSize + 'px';
      updatePreview();
    });

    // ===== ОТСТУПЫ =====
    document.querySelectorAll('.spacing-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.spacing-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSpacing = btn.dataset.spacing;
        updatePreview();
      });
    });

    // ===== ОБНОВЛЕНИЕ ПРЕДПРОСМОТРА =====
    function updatePreview() {
      const previewCard = document.getElementById('previewCard');
      const previewImage = document.getElementById('previewImage');
      const previewText = document.getElementById('previewText');
      
      // Стили текста
      let fontWeight = 'normal';
      let fontStyle = 'normal';
      
      if (currentStyle === 'bold') fontWeight = 'bold';
      if (currentStyle === 'italic') fontStyle = 'italic';
      
      // Отступы
      let padding = '20px';
      if (currentSpacing === 'small') padding = '12px';
      if (currentSpacing === 'large') padding = '32px';
      
      // Текст
      const textContent = textInput.value || 'https://t.me/InstaGroqBot';
      
      // Очищаем карточку
      previewCard.innerHTML = '';
      
      // Строим в зависимости от расположения
      if (currentLayout === 'top') {
        // Текст сверху
        const textDiv = document.createElement('div');
        textDiv.className = 'preview-text-content';
        textDiv.textContent = textContent;
        textDiv.style.cssText = `
          padding: ${padding};
          color: #1a2634;
          font-size: ${currentFontSize}px;
          font-weight: ${fontWeight};
          font-style: ${fontStyle};
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          line-height: 1.6;
          word-wrap: break-word;
        `;
        previewCard.appendChild(textDiv);
        
        if (currentImage) {
          const img = document.createElement('img');
          img.className = 'preview-image';
          img.src = currentImage;
          img.style.cssText = 'width: 100%; height: 200px; object-fit: cover; display: block;';
          previewCard.appendChild(img);
        }
        
      } else if (currentLayout === 'bottom') {
        // Текст снизу
        if (currentImage) {
          const img = document.createElement('img');
          img.className = 'preview-image';
          img.src = currentImage;
          img.style.cssText = 'width: 100%; height: 200px; object-fit: cover; display: block;';
          previewCard.appendChild(img);
        }
        
        const textDiv = document.createElement('div');
        textDiv.className = 'preview-text-content';
        textDiv.textContent = textContent;
        textDiv.style.cssText = `
          padding: ${padding};
          color: #1a2634;
          font-size: ${currentFontSize}px;
          font-weight: ${fontWeight};
          font-style: ${fontStyle};
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          line-height: 1.6;
          word-wrap: break-word;
        `;
        previewCard.appendChild(textDiv);
        
      } else if (currentLayout === 'left') {
        // Текст слева
        previewCard.style.display = 'flex';
        previewCard.style.flexDirection = 'row';
        
        const textDiv = document.createElement('div');
        textDiv.className = 'preview-text-content';
        textDiv.textContent = textContent;
        textDiv.style.cssText = `
          flex: 1;
          padding: ${padding};
          color: #1a2634;
          font-size: ${currentFontSize}px;
          font-weight: ${fontWeight};
          font-style: ${fontStyle};
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          line-height: 1.6;
          word-wrap: break-word;
        `;
        previewCard.appendChild(textDiv);
        
        if (currentImage) {
          const img = document.createElement('img');
          img.className = 'preview-image';
          img.src = currentImage;
          img.style.cssText = 'width: 150px; height: 150px; object-fit: cover; display: block;';
          previewCard.appendChild(img);
        }
        
      } else if (currentLayout === 'right') {
        // Текст справа
        previewCard.style.display = 'flex';
        previewCard.style.flexDirection = 'row';
        
        if (currentImage) {
          const img = document.createElement('img');
          img.className = 'preview-image';
          img.src = currentImage;
          img.style.cssText = 'width: 150px; height: 150px; object-fit: cover; display: block;';
          previewCard.appendChild(img);
        }
        
        const textDiv = document.createElement('div');
        textDiv.className = 'preview-text-content';
        textDiv.textContent = textContent;
        textDiv.style.cssText = `
          flex: 1;
          padding: ${padding};
          color: #1a2634;
          font-size: ${currentFontSize}px;
          font-weight: ${fontWeight};
          font-style: ${fontStyle};
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          line-height: 1.6;
          word-wrap: break-word;
        `;
        previewCard.appendChild(textDiv);
      }
    }

    // ===== ГЕНЕРАЦИЯ QR =====
    generateBtn.addEventListener('click', async () => {
      // Показываем загрузку
      loading.style.display = 'flex';
      
      // Имитация загрузки 2 секунды
      setTimeout(() => {
        // Данные для страницы
        const pageData = {
          text: textInput.value || 'https://t.me/InstaGroqBot',
          image: currentImage,
          layout: currentLayout,
          style: currentStyle,
          fontSize: currentFontSize,
          spacing: currentSpacing
        };
        
        // Создаем ссылку (в реальности тут будет ID)
        const pageUrl = `https://instagroq.page/${Date.now()}`;
        
        // Генерируем QR
        QRCode.toCanvas(qrCanvas, pageUrl, { width: 300 }, (err) => {
          if (err) {
            alert('Ошибка создания QR');
          } else {
            qrLink.textContent = pageUrl;
            mainBlock.style.display = 'none';
            qrSection.style.display = 'block';
          }
          
          // Прячем загрузку
          loading.style.display = 'none';
        });
      }, 2000);
    });

    // ===== СОХРАНЕНИЕ QR =====
    saveQrBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'qr-code.png';
      link.href = qrCanvas.toDataURL();
      link.click();
    });

    // ===== ПОДЕЛИТЬСЯ =====
    shareQrBtn.addEventListener('click', () => {
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.sendData(JSON.stringify({
          type: 'qr',
          url: qrLink.textContent
        }));
      } else {
        navigator.clipboard.writeText(qrLink.textContent);
        alert('Ссылка скопирована!');
      }
    });

    // ===== НОВЫЙ QR =====
    newQrBtn.addEventListener('click', () => {
      qrSection.style.display = 'none';
      mainBlock.style.display = 'block';
      textInput.value = 'https://t.me/InstaGroqBot';
      currentImage = null;
      photoSection.style.display = 'none';
      previewImage.style.display = 'none';
      fileInput.value = '';
      updatePreview();
    });

    // ===== TELEGRAM =====
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // Начальный предпросмотр
    updatePreview();
  </script>
</body>
</html>
