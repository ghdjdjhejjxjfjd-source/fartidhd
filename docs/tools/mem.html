<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Создание мемов</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f18; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
    .tool-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(8,16,30,.55); backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .tool-back {
      color: #fff; text-decoration: none; font-size: 20px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.1); border-radius: 18px;
    }
    .tool-title { font-weight: 700; font-size: 18px; flex: 1; text-align: center; color: #fff; }
    .tool-spacer { width: 36px; }
    .tool-container { padding: 80px 16px 20px; min-height: 100vh; }
    .upload-area {
      background: rgba(255,255,255,.05); border: 2px dashed rgba(255,255,255,.2);
      border-radius: 24px; padding: 40px 20px; text-align: center; cursor: pointer;
      margin: 20px 0; transition: all 0.2s;
    }
    .upload-area:hover { background: rgba(255,255,255,.08); border-color: #3aa0ff; }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-text { font-size: 16px; color: rgba(255,255,255,.7); }
    .meme-editor { display: none; margin-top: 20px; }
    .meme-canvas { width: 100%; border-radius: 16px; background: rgba(0,0,0,.3); }
    .text-input {
      width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1);
      color: white; font-size: 16px;
    }
    .generate-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      font-size: 16px; font-weight: 700; margin: 8px 0; cursor: pointer;
      background: linear-gradient(180deg, #3aa0ff 0%, #0a84ff 100%);
      color: white;
    }
  </style>
</head>
<body>
  <div class="tool-header">
    <a href="../index.html" class="tool-back">←</a>
    <div class="tool-title" id="toolTitle">Создание мемов</div>
    <div class="tool-spacer"></div>
  </div>
  <div class="tool-container">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text" id="uploadText">Нажми чтобы выбрать фото для мема</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
    <div class="meme-editor" id="memeEditor">
      <canvas class="meme-canvas" id="memeCanvas" width="500" height="500"></canvas>
      <input type="text" class="text-input" id="topText" placeholder="Верхний текст">
      <input type="text" class="text-input" id="bottomText" placeholder="Нижний текст">
      <button class="generate-btn" id="generateBtn">🎭 Создать мем</button>
    </div>
  </div>
  <script>
    const I18N = {
      ru: { title: "Создание мемов", upload: "Нажми чтобы выбрать фото для мема", 
            topPlaceholder: "Верхний текст", bottomPlaceholder: "Нижний текст", generate: "🎭 Создать мем" },
      en: { title: "Create Meme", upload: "Select photo for meme",
            topPlaceholder: "Top text", bottomPlaceholder: "Bottom text", generate: "🎭 Create Meme" }
    };
    const lang = (new URL(window.location.href)).searchParams.get("lang") || localStorage.getItem("miniapp_lang_v1") || "ru";
    const t = I18N[lang] || I18N.ru;
    document.getElementById('toolTitle').textContent = t.title;
    document.getElementById('uploadText').textContent = t.upload;
    document.getElementById('topText').placeholder = t.topPlaceholder;
    document.getElementById('bottomText').placeholder = t.bottomPlaceholder;
    document.getElementById('generateBtn').textContent = t.generate;
    
    // Здесь будет логика мемов
  </script>
</body>
</html>
