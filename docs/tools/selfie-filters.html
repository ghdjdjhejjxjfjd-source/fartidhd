<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Селфи фильтры</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f18; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
    .tool-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(8,16,30,.55); backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .tool-back {
      color: #fff; text-decoration: none; font-size: 20px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.1); border-radius: 18px;
    }
    .tool-title { font-weight: 700; font-size: 18px; flex: 1; text-align: center; color: #fff; }
    .tool-spacer { width: 36px; }
    .tool-container { padding: 80px 16px 20px; min-height: 100vh; }
    .camera-area {
      background: rgba(255,255,255,.05); border-radius: 24px;
      overflow: hidden; margin: 20px 0; aspect-ratio: 3/4;
      display: flex; align-items: center; justify-content: center;
    }
    #video { width: 100%; height: 100%; object-fit: cover; }
    .filters-bar {
      display: flex; gap: 12px; overflow-x: auto; padding: 12px 0;
      -webkit-overflow-scrolling: touch;
    }
    .filter-btn {
      min-width: 70px; height: 70px; border-radius: 35px;
      background: rgba(255,255,255,.1); border: 2px solid rgba(255,255,255,.2);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn span { font-size: 12px; margin-top: 4px; }
    .filter-btn.active { border-color: #3aa0ff; background: rgba(58,160,255,.2); }
    .capture-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      font-size: 16px; font-weight: 700; margin: 20px 0; cursor: pointer;
      background: linear-gradient(180deg, #3aa0ff 0%, #0a84ff 100%);
      color: white;
    }
    :root[data-theme="purple"] .capture-btn { background: linear-gradient(180deg, #b98cff 0%, #7a5cff 100%); }
    :root[data-theme="green"] .capture-btn { background: linear-gradient(180deg, #2fd6a3 0%, #11a87b 100%); }
    :root[data-theme="black"] .capture-btn { background: linear-gradient(180deg, #6aa7ff 0%, #2f7bff 100%); }
  </style>
</head>
<body>
  <div class="tool-header">
    <a href="../index.html" class="tool-back">←</a>
    <div class="tool-title" id="toolTitle">Селфи фильтры</div>
    <div class="tool-spacer"></div>
  </div>
  <div class="tool-container">
    <div class="camera-area">
      <video id="video" autoplay playsinline></video>
    </div>
    <div class="filters-bar">
      <div class="filter-btn active" data-filter="none"><div>😐</div><span>Обычный</span></div>
      <div class="filter-btn" data-filter="dog"><div>🐶</div><span>Собака</span></div>
      <div class="filter-btn" data-filter="cat"><div>🐱</div><span>Кот</span></div>
      <div class="filter-btn" data-filter="glasses"><div>👓</div><span>Очки</span></div>
      <div class="filter-btn" data-filter="crown"><div>👑</div><span>Корона</span></div>
    </div>
    <button class="capture-btn" id="captureBtn">📸 Сделать фото</button>
  </div>
  <script>
    const I18N = {
      ru: { title: "Селфи фильтры", capture: "📸 Сделать фото", 
            filters: { none: "Обычный", dog: "Собака", cat: "Кот", glasses: "Очки", crown: "Корона" } },
      en: { title: "Selfie Filters", capture: "📸 Take photo",
            filters: { none: "Normal", dog: "Dog", cat: "Cat", glasses: "Glasses", crown: "Crown" } }
    };
    const lang = (new URL(window.location.href)).searchParams.get("lang") || localStorage.getItem("miniapp_lang_v1") || "ru";
    const t = I18N[lang] || I18N.ru;
    document.getElementById('toolTitle').textContent = t.title;
    document.getElementById('captureBtn').textContent = t.capture;
    
    // Камера
    const video = document.getElementById('video');
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
      } catch (err) {
        alert('Ошибка доступа к камере');
      }
    }
    startCamera();
    
    // Фильтры
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
</html>
