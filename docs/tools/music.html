<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Создание музыки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f18; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
    .tool-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(8,16,30,.55); backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .tool-back {
      color: #fff; text-decoration: none; font-size: 20px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.1); border-radius: 18px;
    }
    .tool-title { font-weight: 700; font-size: 18px; flex: 1; text-align: center; color: #fff; }
    .tool-spacer { width: 36px; }
    .tool-container { padding: 80px 16px 20px; min-height: 100vh; }
    .piano {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
      margin: 20px 0;
    }
    .key {
      aspect-ratio: 3/4; background: rgba(255,255,255,.1);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; transition: all 0.1s;
    }
    .key:active { background: #3aa0ff; transform: scale(0.95); }
    .controls {
      display: flex; gap: 12px; margin: 20px 0;
    }
    .control-btn {
      flex: 1; padding: 16px; border-radius: 16px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      background: rgba(255,255,255,.1); color: white;
    }
    .play-btn { background: linear-gradient(180deg, #3aa0ff 0%, #0a84ff 100%); }
    :root[data-theme="purple"] .play-btn { background: linear-gradient(180deg, #b98cff 0%, #7a5cff 100%); }
    :root[data-theme="green"] .play-btn { background: linear-gradient(180deg, #2fd6a3 0%, #11a87b 100%); }
  </style>
</head>
<body>
  <div class="tool-header">
    <a href="../index.html" class="tool-back">←</a>
    <div class="tool-title" id="toolTitle">Создание музыки</div>
    <div class="tool-spacer"></div>
  </div>
  <div class="tool-container">
    <div class="piano">
      <div class="key" data-note="C">До</div>
      <div class="key" data-note="D">Ре</div>
      <div class="key" data-note="E">Ми</div>
      <div class="key" data-note="F">Фа</div>
      <div class="key" data-note="G">Соль</div>
      <div class="key" data-note="A">Ля</div>
      <div class="key" data-note="B">Си</div>
    </div>
    <div class="controls">
      <button class="control-btn play-btn" id="playBtn">▶ Играть</button>
      <button class="control-btn" id="clearBtn">🧹 Очистить</button>
    </div>
  </div>
  <script>
    const I18N = {
      ru: { title: "Создание музыки", play: "▶ Играть", clear: "🧹 Очистить" },
      en: { title: "Create Music", play: "▶ Play", clear: "🧹 Clear" }
    };
    const lang = (new URL(window.location.href)).searchParams.get("lang") || localStorage.getItem("miniapp_lang_v1") || "ru";
    const t = I18N[lang] || I18N.ru;
    document.getElementById('toolTitle').textContent = t.title;
    document.getElementById('playBtn').textContent = t.play;
    document.getElementById('clearBtn').textContent = t.clear;
    
    // Здесь будет логика пианино
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    
    document.querySelectorAll('.key').forEach(key => {
      key.addEventListener('click', () => {
        const note = key.dataset.note;
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 440; // Потом настроим ноты
        osc.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      });
    });
  </script>
</body>
</html>
