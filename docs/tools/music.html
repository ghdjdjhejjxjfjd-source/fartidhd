<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Music Lab</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.min.js"></script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: #0b0f18; 
      color: white; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      min-height: 100vh; 
    }

    :root[data-theme="blue"] { --accent: #3aa0ff; --accent2: #0a84ff; }
    :root[data-theme="black"] { --accent: #6aa7ff; --accent2: #2f7bff; }
    :root[data-theme="light"] { --accent: #3a8cff; --accent2: #1a6cff; }

    .tool-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(8,16,30,.95); backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .tool-back {
      color: #fff; text-decoration: none; font-size: 20px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.1); border-radius: 18px;
    }

    .tool-title { font-weight: 700; font-size: 18px; flex: 1; text-align: center; color: #fff; }
    .tool-spacer { width: 36px; }

    .container { 
      padding: 80px 16px 20px; 
      min-height: 100vh; 
    }

    /* КНОПКА АКТИВАЦИИ ЗВУКА */
    .activate-section {
      margin: 20px 0;
      text-align: center;
    }

    .activate-btn {
      width: 100%;
      padding: 24px;
      border-radius: 24px;
      border: 2px solid var(--accent);
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
      font-size: 24px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      animation: pulse 2s infinite;
      box-shadow: 0 10px 30px rgba(58,160,255,.4);
    }

    .activate-btn:active {
      transform: scale(0.98);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .activate-hint {
      margin-top: 12px;
      color: rgba(255,255,255,.5);
      font-size: 14px;
    }

    /* ОСНОВНОЙ КОНТЕНТ (скрыт до активации) */
    .main-content {
      display: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .main-content.active {
      display: block;
      opacity: 1;
    }

    .bpm-section {
      background: rgba(255,255,255,.05);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,.1);
    }

    .bpm-label {
      font-size: 14px;
      color: rgba(255,255,255,.6);
      margin-bottom: 10px;
      text-align: center;
    }

    .bpm-control {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .bpm-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      min-width: 80px;
      text-align: center;
    }

    .bpm-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      outline: none;
    }

    .bpm-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    .transport {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .transport-btn {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .transport-btn.play {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
    }

    .transport-btn:active {
      transform: scale(0.98);
    }

    .sequencer {
      background: rgba(255,255,255,.05);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,.1);
    }

    .track {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .track:last-child {
      margin-bottom: 0;
    }

    .track-icon {
      width: 40px;
      font-size: 24px;
      text-align: center;
    }

    .track-name {
      width: 80px;
      font-size: 14px;
      color: rgba(255,255,255,.6);
    }

    .steps {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 5px 0;
      -webkit-overflow-scrolling: touch;
    }

    .step {
      min-width: 36px;
      height: 36px;
      background: rgba(255,255,255,.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.1s;
      border: 1px solid rgba(255,255,255,.05);
    }

    .step.active {
      background: var(--accent);
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(58,160,255,.3);
    }

    .step.playing {
      background: var(--accent2);
      animation: stepPulse 0.1s ease;
    }

    @keyframes stepPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .sound-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .sound-btn {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sound-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .sound-btn:active {
      transform: scale(0.95);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .action-btn {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn.random {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
    }

    .volume-indicator {
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
    }

    .volume-level {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.05s;
    }
  </style>
</head>
<body>
  <div class="tool-header">
    <a href="../index.html" class="tool-back">←</a>
    <div class="tool-title" id="toolTitle">🎵 Music Lab</div>
    <div class="tool-spacer"></div>
  </div>

  <div class="container">
    <!-- КНОПКА АКТИВАЦИИ ЗВУКА -->
    <div class="activate-section" id="activateSection">
      <button class="activate-btn" id="activateBtn">
        🔊 НАЖМИ ДЛЯ ЗВУКА
      </button>
      <div class="activate-hint" id="activateHint">
        Нажми чтобы включить звук (нужно для iPhone и Android)
      </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-content" id="mainContent">
      <!-- BPM контрол -->
      <div class="bpm-section">
        <div class="bpm-label">⚡ BPM (темп)</div>
        <div class="bpm-control">
          <span class="bpm-value" id="bpmValue">120</span>
          <input type="range" class="bpm-slider" id="bpmSlider" min="60" max="180" value="120">
        </div>
      </div>

      <!-- Кнопки управления -->
      <div class="transport">
        <button class="transport-btn play" id="playBtn">▶</button>
        <button class="transport-btn" id="stopBtn">⏹</button>
        <button class="transport-btn" id="clearBtn">🧹</button>
      </div>

      <!-- Секвенсор -->
      <div class="sequencer">
        <div class="track">
          <span class="track-icon">🥁</span>
          <span class="track-name">Kick</span>
          <div class="steps" id="kickSteps"></div>
        </div>
        <div class="track">
          <span class="track-icon">🔔</span>
          <span class="track-name">Hi-hat</span>
          <div class="steps" id="hatSteps"></div>
        </div>
        <div class="track">
          <span class="track-icon">🎹</span>
          <span class="track-name">Melody</span>
          <div class="steps" id="melodySteps"></div>
        </div>
      </div>

      <!-- Выбор звуков -->
      <div class="sound-grid">
        <button class="sound-btn active" data-sound="kick">🥁 Kick</button>
        <button class="sound-btn" data-sound="snare">🥁 Snare</button>
        <button class="sound-btn" data-sound="hat">🔔 Hi-hat</button>
        <button class="sound-btn" data-sound="piano">🎹 Piano</button>
        <button class="sound-btn" data-sound="bass">🎸 Bass</button>
        <button class="sound-btn" data-sound="synth">🎛 Synth</button>
      </div>

      <!-- Кнопки действий -->
      <div class="action-buttons">
        <button class="action-btn" id="saveBtn">💾 Скачать</button>
        <button class="action-btn random" id="randomBtn">🎲 Рандом</button>
      </div>

      <!-- Визуализация -->
      <div class="volume-indicator">
        <div class="volume-level" id="volumeLevel"></div>
      </div>
    </div>
  </div>

  <script>
    // ===== ПЕРЕВОДЫ =====
    const TRANSLATIONS = {
      ru: { 
        title: "🎵 Music Lab", 
        activate: "🔊 НАЖМИ ДЛЯ ЗВУКА",
        hint: "Нажми чтобы включить звук (нужно для iPhone и Android)",
        play: "▶", stop: "⏹", clear: "🧹", save: "💾 Скачать", random: "🎲 Рандом" 
      },
      en: { 
        title: "🎵 Music Lab", 
        activate: "🔊 TAP FOR SOUND",
        hint: "Tap to enable sound (required for iPhone & Android)",
        play: "▶", stop: "⏹", clear: "🧹", save: "💾 Download", random: "🎲 Random" 
      }
    };

    function getLang() {
      const url = new URL(window.location.href);
      const qp = url.searchParams.get("lang");
      if (qp) return qp;
      try { return localStorage.getItem("miniapp_lang_v1") || "ru"; } 
      catch(e) { return "ru"; }
    }

    const lang = getLang();
    const t = TRANSLATIONS[lang] || TRANSLATIONS.ru;
    
    document.getElementById('toolTitle').textContent = t.title;
    document.getElementById('activateBtn').textContent = t.activate;
    document.getElementById('activateHint').textContent = t.hint;
    document.getElementById('playBtn').textContent = t.play;
    document.getElementById('stopBtn').textContent = t.stop;
    document.getElementById('clearBtn').textContent = t.clear;
    document.getElementById('saveBtn').textContent = t.save;
    document.getElementById('randomBtn').textContent = t.random;

    // ===== ПЕРЕМЕННЫЕ =====
    let isAudioReady = false;
    let sequence = {
      kick: new Array(16).fill(false),
      hat: new Array(16).fill(false),
      melody: new Array(16).fill(false)
    };
    let currentStep = 0;
    let isPlaying = false;
    
    // Инструменты (создадим после активации)
    let synth, kick, hat;

    // ===== АКТИВАЦИЯ ЗВУКА =====
    document.getElementById('activateBtn').addEventListener('click', async () => {
      try {
        // Создаем инструменты
        synth = new Tone.Synth().toDestination();
        kick = new Tone.MembraneSynth().toDestination();
        hat = new Tone.NoiseSynth({ noise: { type: 'white' } }).toDestination();
        
        // Запускаем аудио контекст
        await Tone.start();
        
        // Тестовый звук чтобы убедиться
        await kick.triggerAttackRelease('C1', '8n');
        
        // Прячем кнопку активации, показываем контент
        document.getElementById('activateSection').style.display = 'none';
        document.getElementById('mainContent').classList.add('active');
        
        isAudioReady = true;
        
        // Запускаем секвенсор
        setupSequencer();
        
      } catch (e) {
        alert('Ошибка активации звука. Попробуй еще раз.');
        console.error(e);
      }
    });

    // ===== СОЗДАНИЕ ШАГОВ =====
    function createSteps(containerId, track) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      
      for (let i = 0; i < 16; i++) {
        const step = document.createElement('div');
        step.className = 'step' + (sequence[track][i] ? ' active' : '');
        step.dataset.index = i;
        step.dataset.track = track;
        
        step.addEventListener('click', () => {
          if (!isAudioReady) return;
          sequence[track][i] = !sequence[track][i];
          step.classList.toggle('active');
        });
        
        container.appendChild(step);
      }
    }

    createSteps('kickSteps', 'kick');
    createSteps('hatSteps', 'hat');
    createSteps('melodySteps', 'melody');

    // ===== BPM =====
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValue = document.getElementById('bpmValue');
    
    bpmSlider.addEventListener('input', (e) => {
      const bpm = e.target.value;
      bpmValue.textContent = bpm;
      if (isAudioReady) {
        Tone.Transport.bpm.value = bpm;
      }
    });

    // ===== УПРАВЛЕНИЕ =====
    document.getElementById('playBtn').addEventListener('click', () => {
      if (!isAudioReady) return;
      
      if (isPlaying) {
        Tone.Transport.pause();
        isPlaying = false;
      } else {
        Tone.Transport.start();
        isPlaying = true;
      }
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      if (!isAudioReady) return;
      
      Tone.Transport.stop();
      isPlaying = false;
      currentStep = 0;
      
      document.querySelectorAll('.step').forEach(step => {
        step.classList.remove('playing');
      });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!isAudioReady) return;
      
      for (let track in sequence) {
        sequence[track].fill(false);
      }
      
      document.querySelectorAll('.step').forEach(step => {
        step.classList.remove('active');
      });
    });

    document.getElementById('randomBtn').addEventListener('click', () => {
      if (!isAudioReady) return;
      
      for (let track in sequence) {
        for (let i = 0; i < 16; i++) {
          sequence[track][i] = Math.random() > 0.7;
        }
      }
      
      document.querySelectorAll('.step').forEach(step => {
        const track = step.dataset.track;
        const index = parseInt(step.dataset.index);
        if (sequence[track][index]) {
          step.classList.add('active');
        } else {
          step.classList.remove('active');
        }
      });
    });

    // ===== СЕКВЕНСОР =====
    function setupSequencer() {
      Tone.Transport.scheduleRepeat((time) => {
        // Kick
        if (sequence.kick[currentStep]) {
          kick.triggerAttackRelease('C1', '8n', time);
        }
        
        // Hi-hat
        if (sequence.hat[currentStep]) {
          hat.triggerAttackRelease('16n', time);
        }
        
        // Melody
        if (sequence.melody[currentStep]) {
          const notes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
          const note = notes[Math.floor(Math.random() * notes.length)];
          synth.triggerAttackRelease(note, '8n', time);
        }

        // Подсветка
        document.querySelectorAll('.step').forEach(step => {
          step.classList.remove('playing');
        });
        
        document.querySelectorAll(`[data-index="${currentStep}"]`).forEach(step => {
          step.classList.add('playing');
        });

        // Визуализация
        const volumeLevel = document.getElementById('volumeLevel');
        volumeLevel.style.width = (30 + Math.random() * 70) + '%';

        currentStep = (currentStep + 1) % 16;
      }, '16n');
    }

    // ===== СОХРАНЕНИЕ =====
    document.getElementById('saveBtn').addEventListener('click', () => {
      if (!isAudioReady) return;
      alert('🎵 Трек готов! (Запись будет позже)');
    });

    // ===== ВЫБОР ЗВУКОВ =====
    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!isAudioReady) return;
        document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Здесь можно менять звуки
        const sound = btn.dataset.sound;
        // Будем расширять позже
      });
    });

    // ===== TELEGRAM =====
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
