<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Удаление фона</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    :root[data-theme="blue"] { --accent: #3aa0ff; }
    :root[data-theme="black"] { --accent: #6aa7ff; }
    :root[data-theme="light"] { --accent: #3a8cff; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .container {
      padding: 80px 16px 20px;
      min-height: 100vh;
    }

    .upload-area {
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
    }

    .result-container {
      display: none;
    }

    .image-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .result-image {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-message {
      display: none;
      background: rgba(0,255,0,0.2);
      border: 1px solid #00ff00;
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
      text-align: center;
      color: #00ff00;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="title" id="title">Удаление фона</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <!-- Область загрузки -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text" id="uploadText">Нажми чтобы выбрать фото</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <!-- Результат -->
    <div class="result-container" id="resultContainer">
      <div class="image-box">
        <img class="result-image" id="resultImg" src="">
      </div>

      <!-- Сообщение об успехе -->
      <div class="success-message" id="successMessage">
        ✅ Фото обработано
      </div>

      <button class="btn btn-primary" id="processBtn">✨ Удалить фон</button>
      <button class="btn btn-secondary" id="downloadBtn" style="display: none;">💾 Сохранить</button>
      <button class="btn btn-secondary" id="newBtn">📸 Новое фото</button>
    </div>
  </div>

  <!-- Загрузка -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingText">Удаляю фон...</div>
  </div>

  <script>
    // ⚠️ НАСТРОЙКИ
    const API_BASE = "https://fartidhd-production.up.railway.app";

    // Переводы
    const translations = {
      ru: {
        title: "Удаление фона",
        upload: "Нажми чтобы выбрать фото",
        process: "✨ Удалить фон",
        download: "💾 Сохранить",
        new: "📸 Новое фото",
        loading: "Удаляю фон...",
        success: "✅ Фото обработано"
      },
      en: {
        title: "Remove Background",
        upload: "Click to select photo",
        process: "✨ Remove Background",
        download: "💾 Save",
        new: "📸 New Photo",
        loading: "Removing background...",
        success: "✅ Image processed"
      }
    };

    function getLang() {
      const urlParams = new URLSearchParams(window.location.search);
      const lang = urlParams.get('lang');
      if (lang) return lang;
      try { return localStorage.getItem('miniapp_lang_v1') || 'ru'; } 
      catch(e) { return 'ru'; }
    }

    function getUser() {
      const tg = window.Telegram?.WebApp;
      if (!tg || !tg.initDataUnsafe?.user) return null;
      return tg.initDataUnsafe.user;
    }

    const lang = getLang();
    const user = getUser();
    const t = translations[lang] || translations.ru;

    document.getElementById('title').textContent = t.title;
    document.getElementById('uploadText').textContent = t.upload;
    document.getElementById('processBtn').textContent = t.process;
    document.getElementById('downloadBtn').textContent = t.download;
    document.getElementById('newBtn').textContent = t.new;
    document.getElementById('loadingText').textContent = t.loading;
    document.getElementById('successMessage').textContent = t.success;

    // Элементы
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const resultImg = document.getElementById('resultImg');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const newBtn = document.getElementById('newBtn');
    const loading = document.getElementById('loading');
    const successMessage = document.getElementById('successMessage');

    let currentFile = null;
    let currentResultBlob = null;

    // Загрузка фото
    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        
        // Проверка размера (макс 5MB)
        if (file.size > 5 * 1024 * 1024) {
          alert('Файл слишком большой. Максимум 5MB');
          return;
        }
        
        currentFile = file;
        
        // Сразу показываем результат (пустой)
        uploadArea.style.display = 'none';
        resultContainer.style.display = 'block';
        downloadBtn.style.display = 'none';
        successMessage.style.display = 'none';
        resultImg.src = '';
      }
    });

    // Удаление фона через новый эндпоинт Pixian.ai
    processBtn.addEventListener('click', async () => {
      if (!currentFile || !user) {
        alert('Нужно авторизоваться в Telegram');
        return;
      }

      loading.style.display = 'flex';
      processBtn.disabled = true;

      try {
        const formData = new FormData();
        formData.append('user_id', user.id);
        formData.append('image', currentFile);

        const response = await fetch(`${API_BASE}/api/remove-bg`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Ошибка обработки');
        }

        // Показываем результат
        resultImg.src = data.image_base64;
        
        // Конвертируем base64 в blob для сохранения
        const base64Data = data.image_base64.split(',')[1];
        const byteCharacters = atob(base64Data);
        const byteArrays = [];
        
        for (let i = 0; i < byteCharacters.length; i++) {
          byteArrays.push(byteCharacters.charCodeAt(i));
        }
        
        currentResultBlob = new Blob([new Uint8Array(byteArrays)], { type: 'image/png' });

        downloadBtn.style.display = 'block';
        successMessage.style.display = 'none';

      } catch (error) {
        alert('Ошибка: ' + error.message);
      } finally {
        loading.style.display = 'none';
        processBtn.disabled = false;
      }
    });

    // Сохранение на телефон
    downloadBtn.addEventListener('click', async () => {
      if (!currentResultBlob) return;

      const tg = window.Telegram?.WebApp;

      // Пробуем через Telegram WebApp (сохраняет в галерею)
      if (tg && tg.sendData) {
        try {
          // Конвертируем blob в base64 для отправки
          const reader = new FileReader();
          reader.onload = () => {
            const base64 = reader.result.split(',')[1];
            tg.sendData(JSON.stringify({
              type: 'photo',
              file: base64,
              filename: 'no-bg.png'
            }));
            
            successMessage.style.display = 'block';
            setTimeout(() => {
              successMessage.style.display = 'none';
            }, 3000);
          };
          reader.readAsDataURL(currentResultBlob);
          
        } catch (e) {
          // Если не получилось через Telegram, пробуем через ссылку
          fallbackDownload();
        }
      } else {
        fallbackDownload();
      }
    });

    function fallbackDownload() {
      // Создаем ссылку для скачивания
      const url = URL.createObjectURL(currentResultBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'no-bg.png';
      link.click();
      URL.revokeObjectURL(url);
      
      successMessage.style.display = 'block';
      setTimeout(() => {
        successMessage.style.display = 'none';
      }, 3000);
    }

    // Новое фото
    newBtn.addEventListener('click', () => {
      uploadArea.style.display = 'block';
      resultContainer.style.display = 'none';
      fileInput.value = '';
      currentFile = null;
      currentResultBlob = null;
    });

    // Telegram
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
