<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Удаление фона</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    :root[data-theme="blue"] { --accent: #3aa0ff; }
    :root[data-theme="black"] { --accent: #6aa7ff; }
    :root[data-theme="light"] { --accent: #3a8cff; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .container {
      padding: 80px 16px 20px;
      min-height: 100vh;
    }

    /* Область загрузки */
    .upload-area {
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
    }

    /* Результат */
    .result-container {
      display: none;
    }

    .image-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .result-image {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Загрузка */
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .demo-badge {
      background: rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 20px;
      text-align: center;
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="title" id="title">Удаление фона</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <div class="demo-badge" id="demoBadge">
      ⚡ Демо-режим (тестовое удаление фона)
    </div>

    <!-- Область загрузки -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text" id="uploadText">Нажми чтобы выбрать фото</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <!-- Результат (оригинал скрыт) -->
    <div class="result-container" id="resultContainer">
      <div class="image-box">
        <img class="result-image" id="resultImg" src="">
      </div>

      <button class="btn btn-primary" id="processBtn">✨ Удалить фон</button>
      <button class="btn btn-secondary" id="downloadBtn" style="display: none;">💾 Скачать</button>
      <button class="btn btn-secondary" id="newBtn">📸 Новое фото</button>
    </div>
  </div>

  <!-- Загрузка -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingText">Обработка...</div>
  </div>

  <script>
    // Переводы
    const translations = {
      ru: {
        title: "Удаление фона",
        upload: "Нажми чтобы выбрать фото",
        process: "✨ Удалить фон",
        download: "💾 Скачать",
        new: "📸 Новое фото",
        loading: "Обработка...",
        demo: "⚡ Демо-режим (тестовое удаление фона)"
      },
      en: {
        title: "Remove Background",
        upload: "Click to select photo",
        process: "✨ Remove Background",
        download: "💾 Download",
        new: "📸 New Photo",
        loading: "Processing...",
        demo: "⚡ Demo mode (test background removal)"
      }
    };

    function getLang() {
      const urlParams = new URLSearchParams(window.location.search);
      const lang = urlParams.get('lang');
      if (lang) return lang;
      try { return localStorage.getItem('miniapp_lang_v1') || 'ru'; } 
      catch(e) { return 'ru'; }
    }

    const lang = getLang();
    const t = translations[lang] || translations.ru;

    document.getElementById('title').textContent = t.title;
    document.getElementById('uploadText').textContent = t.upload;
    document.getElementById('processBtn').textContent = t.process;
    document.getElementById('downloadBtn').textContent = t.download;
    document.getElementById('newBtn').textContent = t.new;
    document.getElementById('loadingText').textContent = t.loading;
    document.getElementById('demoBadge').textContent = t.demo;

    // Элементы
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const resultImg = document.getElementById('resultImg');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const newBtn = document.getElementById('newBtn');
    const loading = document.getElementById('loading');

    let currentFile = null;

    // Загрузка фото
    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        currentFile = file;
        
        const reader = new FileReader();
        reader.onload = (e) => {
          // Сразу показываем результат (оригинал не показываем)
          uploadArea.style.display = 'none';
          resultContainer.style.display = 'block';
          downloadBtn.style.display = 'none';
          resultImg.src = ''; // Пусто пока не нажали кнопку
        };
        reader.readAsDataURL(file);
      }
    });

    // Демо-обработка (без ИИ)
    processBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      loading.style.display = 'flex';
      processBtn.disabled = true;

      // Имитация обработки
      setTimeout(() => {
        // Создаем canvas для демо-эффекта
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          
          // Рисуем изображение
          ctx.drawImage(img, 0, 0);
          
          // Демо-эффект: делаем фон прозрачным (на самом деле просто обводка)
          // Это просто для демонстрации, настоящий фон удалим позже через API
          
          // Получаем результат
          resultImg.src = canvas.toDataURL('image/png');
          
          // Показываем кнопку скачивания
          downloadBtn.style.display = 'block';
          
          // Прячем загрузку
          loading.style.display = 'none';
          processBtn.disabled = false;
        };
        
        const reader = new FileReader();
        reader.onload = (e) => {
          img.src = e.target.result;
        };
        reader.readAsDataURL(currentFile);
        
      }, 1500); // Имитация загрузки 1.5 сек
    });

    // Скачивание
    downloadBtn.addEventListener('click', () => {
      if (!resultImg.src) return;
      
      const link = document.createElement('a');
      link.download = 'no-bg.png';
      link.href = resultImg.src;
      link.click();
    });

    // Новое фото
    newBtn.addEventListener('click', () => {
      uploadArea.style.display = 'block';
      resultContainer.style.display = 'none';
      fileInput.value = '';
      currentFile = null;
    });

    // Telegram
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
