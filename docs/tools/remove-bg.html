<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Удаление фона</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- TensorFlow.js и модель для удаления фона -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.1.1/dist/body-pix.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    :root[data-theme="blue"] { --accent: #3aa0ff; }
    :root[data-theme="black"] { --accent: #6aa7ff; }
    :root[data-theme="purple"] { --accent: #b98cff; }
    :root[data-theme="green"] { --accent: #2fd6a3; }
    :root[data-theme="gray"] { --accent: #7fb2ff; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .container {
      padding: 80px 16px 20px;
      min-height: 100vh;
    }

    .upload-area {
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
    }

    .result-container {
      display: none;
      margin-top: 20px;
    }

    .image-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .image-label {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    canvas {
      width: 100%;
      max-height: 300px;
      border-radius: 8px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .model-loading {
      text-align: center;
      margin: 20px 0;
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="title" id="title">Удаление фона</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text" id="uploadText">Нажми чтобы выбрать фото</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div class="model-loading" id="modelLoading">⏳ Загрузка нейросети...</div>

    <div class="result-container" id="resultContainer">
      <div class="image-box">
        <div class="image-label" id="originalLabel">Оригинал</div>
        <canvas id="originalCanvas"></canvas>
      </div>
      
      <div class="image-box">
        <div class="image-label" id="resultLabel">Результат</div>
        <canvas id="resultCanvas"></canvas>
      </div>

      <button class="btn btn-primary" id="processBtn" disabled>✨ Удалить фон</button>
      <button class="btn btn-secondary" id="downloadBtn" style="display: none;">💾 Скачать</button>
      <button class="btn btn-secondary" id="newBtn">📸 Новое фото</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingText">Обработка...</div>
  </div>

  <script>
    // Переводы
    const translations = {
      ru: {
        title: "Удаление фона",
        upload: "Нажми чтобы выбрать фото",
        original: "Оригинал",
        result: "Результат",
        process: "✨ Удалить фон",
        download: "💾 Скачать",
        new: "📸 Новое фото",
        loading: "Обработка...",
        modelLoading: "⏳ Загрузка нейросети..."
      },
      en: {
        title: "Remove Background",
        upload: "Click to select photo",
        original: "Original",
        result: "Result",
        process: "✨ Remove Background",
        download: "💾 Download",
        new: "📸 New Photo",
        loading: "Processing...",
        modelLoading: "⏳ Loading AI model..."
      }
    };

    function getLang() {
      const urlParams = new URLSearchParams(window.location.search);
      const lang = urlParams.get('lang');
      if (lang) return lang;
      try { return localStorage.getItem('miniapp_lang_v1') || 'ru'; } 
      catch(e) { return 'ru'; }
    }

    const lang = getLang();
    const t = translations[lang] || translations.ru;

    document.getElementById('title').textContent = t.title;
    document.getElementById('uploadText').textContent = t.upload;
    document.getElementById('originalLabel').textContent = t.original;
    document.getElementById('resultLabel').textContent = t.result;
    document.getElementById('processBtn').textContent = t.process;
    document.getElementById('downloadBtn').textContent = t.download;
    document.getElementById('newBtn').textContent = t.new;
    document.getElementById('loadingText').textContent = t.loading;
    document.getElementById('modelLoading').textContent = t.modelLoading;

    // Элементы
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const originalCanvas = document.getElementById('originalCanvas');
    const resultCanvas = document.getElementById('resultCanvas');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const newBtn = document.getElementById('newBtn');
    const loading = document.getElementById('loading');
    const modelLoading = document.getElementById('modelLoading');

    let net = null;
    let currentImage = null;

    // Загрузка модели BodyPix
    async function loadModel() {
      try {
        modelLoading.style.display = 'block';
        net = await bodyPix.load({
          architecture: 'MobileNetV1',
          outputStride: 16,
          multiplier: 0.75,
          quantBytes: 2
        });
        console.log('Модель загружена');
        modelLoading.style.display = 'none';
        processBtn.disabled = false;
      } catch (error) {
        console.error('Ошибка загрузки модели:', error);
        modelLoading.innerHTML = '❌ Ошибка загрузки. Обновите страницу.';
      }
    }

    // Загружаем модель при старте
    loadModel();

    // Загрузка фото
    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            currentImage = img;
            
            // Рисуем на canvas
            originalCanvas.width = img.width;
            originalCanvas.height = img.height;
            const ctx = originalCanvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            uploadArea.style.display = 'none';
            resultContainer.style.display = 'block';
            downloadBtn.style.display = 'none';
            
            // Очищаем результат
            resultCanvas.width = img.width;
            resultCanvas.height = img.height;
            const resultCtx = resultCanvas.getContext('2d');
            resultCtx.clearRect(0, 0, img.width, img.height);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // УДАЛЕНИЕ ФОНА (РАБОТАЕТ!)
    processBtn.addEventListener('click', async () => {
      if (!net || !currentImage) {
        alert('Модель еще не загружена');
        return;
      }

      loading.style.display = 'flex';
      processBtn.disabled = true;

      try {
        // Сегментируем человека на фото
        const segmentation = await net.segmentPerson(currentImage, {
          flipHorizontal: false,
          internalResolution: 'medium',
          segmentationThreshold: 0.7
        });

        // Создаем маску
        const mask = bodyPix.toMask(segmentation, { r: 255, g: 255, b: 255, a: 255 }, { r: 0, g: 0, b: 0, a: 0 });

        // Применяем маску к оригинальному изображению
        bodyPix.drawMask(
          resultCanvas,
          currentImage,
          mask,
          1, // opacity
          0, // mask opacity
          false // не переворачивать
        );

        // Делаем фон прозрачным
        const ctx = resultCanvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
        
        for (let i = 0; i < imageData.data.length; i += 4) {
          if (imageData.data[i] === 0 && 
              imageData.data[i + 1] === 0 && 
              imageData.data[i + 2] === 0) {
            imageData.data[i + 3] = 0; // прозрачность
          }
        }
        
        ctx.putImageData(imageData, 0, 0);
        
        downloadBtn.style.display = 'block';

      } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка при обработке');
      } finally {
        loading.style.display = 'none';
        processBtn.disabled = false;
      }
    });

    // Скачивание
    downloadBtn.addEventListener('click', () => {
      resultCanvas.toBlob((blob) => {
        const link = document.createElement('a');
        link.download = 'no-bg.png';
        link.href = URL.createObjectURL(blob);
        link.click();
      }, 'image/png');
    });

    // Новое фото
    newBtn.addEventListener('click', () => {
      uploadArea.style.display = 'block';
      resultContainer.style.display = 'none';
      fileInput.value = '';
      currentImage = null;
    });

    // Telegram
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
