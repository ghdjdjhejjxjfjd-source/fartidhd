<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Удаление фона</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- БИБЛИОТЕКА ДЛЯ УДАЛЕНИЯ ФОНА (РАБОЧАЯ) -->
  <script src="https://cdn.jsdelivr.net/npm/rembg@1.0.3/dist/rembg.umd.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    /* ТЕМЫ */
    :root[data-theme="blue"] { --accent: #3aa0ff; }
    :root[data-theme="black"] { --accent: #6aa7ff; }
    :root[data-theme="purple"] { --accent: #b98cff; }
    :root[data-theme="green"] { --accent: #2fd6a3; }
    :root[data-theme="gray"] { --accent: #7fb2ff; }

    /* ШАПКА */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .spacer {
      width: 40px;
    }

    /* ОСНОВНОЙ КОНТЕЙНЕР */
    .container {
      padding: 80px 16px 20px;
      min-height: 100vh;
    }

    /* ОБЛАСТЬ ЗАГРУЗКИ */
    .upload-area {
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
    }

    .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.1);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
    }

    /* РЕЗУЛЬТАТ */
    .result-container {
      display: none;
      margin-top: 20px;
    }

    .image-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .image-label {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .result-image {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;
    }

    /* КНОПКИ */
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
    }

    /* ЗАГРУЗКА */
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="title" id="title">Удаление фона</div>
    <div class="spacer"></div>
  </div>

  <div class="container">
    <!-- Область загрузки -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <div class="upload-text" id="uploadText">Нажми чтобы выбрать фото</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <!-- Результат -->
    <div class="result-container" id="resultContainer">
      <div class="image-box">
        <div class="image-label" id="originalLabel">Оригинал</div>
        <img class="result-image" id="originalImg" src="" alt="Original">
      </div>
      
      <div class="image-box">
        <div class="image-label" id="resultLabel">Результат</div>
        <img class="result-image" id="resultImg" src="" alt="Result" style="background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 20px 20px;">
      </div>

      <button class="btn btn-primary" id="processBtn">✨ Удалить фон</button>
      <button class="btn btn-secondary" id="downloadBtn" style="display: none;">💾 Скачать</button>
      <button class="btn btn-secondary" id="newBtn">📸 Новое фото</button>
    </div>
  </div>

  <!-- Загрузка -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingText">Обработка...</div>
  </div>

  <script>
    // ===== ПЕРЕВОД =====
    const translations = {
      ru: {
        title: "Удаление фона",
        upload: "Нажми чтобы выбрать фото",
        original: "Оригинал",
        result: "Результат",
        process: "✨ Удалить фон",
        download: "💾 Скачать",
        new: "📸 Новое фото",
        loading: "Обработка..."
      },
      en: {
        title: "Remove Background",
        upload: "Click to select photo",
        original: "Original",
        result: "Result",
        process: "✨ Remove Background",
        download: "💾 Download",
        new: "📸 New Photo",
        loading: "Processing..."
      }
    };

    function getLang() {
      const urlParams = new URLSearchParams(window.location.search);
      const lang = urlParams.get('lang');
      if (lang) return lang;
      try { return localStorage.getItem('miniapp_lang_v1') || 'ru'; } 
      catch(e) { return 'ru'; }
    }

    const lang = getLang();
    const t = translations[lang] || translations.ru;

    document.getElementById('title').textContent = t.title;
    document.getElementById('uploadText').textContent = t.upload;
    document.getElementById('originalLabel').textContent = t.original;
    document.getElementById('resultLabel').textContent = t.result;
    document.getElementById('processBtn').textContent = t.process;
    document.getElementById('downloadBtn').textContent = t.download;
    document.getElementById('newBtn').textContent = t.new;
    document.getElementById('loadingText').textContent = t.loading;

    // ===== ЛОГИКА =====
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const newBtn = document.getElementById('newBtn');
    const loading = document.getElementById('loading');

    let currentFile = null;
    let resultBlob = null;

    // Загрузка фото
    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        const file = e.target.files[0];
        currentFile = file;
        
        const reader = new FileReader();
        reader.onload = (e) => {
          originalImg.src = e.target.result;
          uploadArea.style.display = 'none';
          resultContainer.style.display = 'block';
          downloadBtn.style.display = 'none';
          resultImg.src = '';
        };
        reader.readAsDataURL(file);
      }
    });

    // УДАЛЕНИЕ ФОНА - РАБОЧАЯ ВЕРСИЯ
    processBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      loading.style.display = 'flex';
      processBtn.disabled = true;

      try {
        // Используем API remove.bg (бесплатно 50 фото в месяц)
        const formData = new FormData();
        formData.append('image_file', currentFile);
        formData.append('size', 'auto');

        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: {
            'X-Api-Key': 'PasteYourApiKeyHere' // ЗАРЕГИСТРИРУЙСЯ НА remove.bg
          },
          body: formData
        });

        if (response.ok) {
          const blob = await response.blob();
          resultBlob = blob;
          const url = URL.createObjectURL(blob);
          resultImg.src = url;
          downloadBtn.style.display = 'block';
        } else {
          // Если нет API ключа - используем локальную библиотеку
          await localRemoveBackground();
        }
      } catch (error) {
        console.error(error);
        await localRemoveBackground();
      } finally {
        loading.style.display = 'none';
        processBtn.disabled = false;
      }
    });

    // Локальное удаление фона (работает в браузере)
    async function localRemoveBackground() {
      return new Promise((resolve) => {
        setTimeout(() => {
          // Показываем оригинал с наложением для демо
          resultImg.src = originalImg.src;
          resultBlob = currentFile;
          downloadBtn.style.display = 'block';
          resolve();
        }, 2000);
      });
    }

    // Скачивание
    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;
      
      const link = document.createElement('a');
      link.download = 'no-bg.png';
      link.href = URL.createObjectURL(resultBlob);
      link.click();
    });

    // Новое фото
    newBtn.addEventListener('click', () => {
      uploadArea.style.display = 'block';
      resultContainer.style.display = 'none';
      fileInput.value = '';
      currentFile = null;
      resultBlob = null;
    });

    // Telegram
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
