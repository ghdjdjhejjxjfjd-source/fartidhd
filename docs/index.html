  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');
        tg.onEvent('viewportChanged', function() {
          document.documentElement.style.setProperty('--vh', tg.viewportHeight + 'px');
        });
      }
    })();
  </script>

  <!-- ТЕМА И СТИЛЬ -->
  <script>
    (function(){
      const THEME_KEY = "miniapp_theme_v1";
      const STYLE_KEY = "miniapp_style_v1";
      
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(THEME_KEY) || "blue"; }catch(e){ return "blue"; }
      }
      
      function getStyle() {
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("style");
        if (qp) return qp;
        try{ return localStorage.getItem(STYLE_KEY) || "normal"; }catch(e){ return "normal"; }
      }
      
      const theme = getTheme();
      const style = getStyle();
      
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.setAttribute("data-style", style);
      
      try{ 
        localStorage.setItem(THEME_KEY, theme);
        localStorage.setItem(STYLE_KEY, style);
      }catch(e){}
    })();
  </script>

  <!-- Запрет зума -->
  <script>
    (function(){
      document.addEventListener("gesturestart", (e) => e.preventDefault(), { passive:false });
      document.addEventListener("gesturechange", (e) => e.preventDefault(), { passive:false });
      document.addEventListener("gestureend", (e) => e.preventDefault(), { passive:false });

      let lastTouchEnd = 0;
      document.addEventListener("touchend", (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive:false });

      document.addEventListener("dblclick", (e) => e.preventDefault(), { passive:false });
    })();
  </script>
