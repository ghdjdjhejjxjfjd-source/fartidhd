<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>💫 NextAI</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ПОЛНОЭКРАННЫЙ РЕЖИМ -->
  <script>
    (function(){
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();
        
        const setHeight = () => {
          const vh = tg.viewportHeight || window.innerHeight;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        };
        
        setHeight();
        tg.onEvent('viewportChanged', setHeight);
      } else {
        const setHeight = () => {
          document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
        };
        setHeight();
        window.addEventListener('resize', setHeight);
      }
    })();
  </script>

  <!-- ТЕМА -->
  <script>
    (function(){
      const KEY = "miniapp_theme_v1";
      function getTheme(){
        const url = new URL(window.location.href);
        const qp = url.searchParams.get("theme");
        if (qp) return qp;
        try{ return localStorage.getItem(KEY) || "blue"; }catch(e){ return "blue"; }
      }
      document.documentElement.setAttribute("data-theme", getTheme());
    })();
  </script>

  <!-- Запрет зума -->
  <script>
    (function(){
      document.addEventListener("gesturestart", (e) => e.preventDefault(), { passive:false });
      document.addEventListener("gesturechange", (e) => e.preventDefault(), { passive:false });
      document.addEventListener("gestureend", (e) => e.preventDefault(), { passive:false });

      let lastTouchEnd = 0;
      document.addEventListener("touchend", (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive:false });

      document.addEventListener("dblclick", (e) => e.preventDefault(), { passive:false });
    })();
  </script>

  <style>
    /* ПОЛНОЭКРАННЫЕ СТИЛИ */
    :root {
      --vh: 100vh;
    }
    
    html, body {
      height: var(--vh);
      height: -webkit-fill-available;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }
    
    body {
      position: relative;
      background: transparent;
      color: var(--text);
      display: flex;
      flex-direction: column;
      /* МАКСИМАЛЬНАЯ ЧЕТКОСТЬ ДЛЯ ВСЕХ ТЕМ (iOS/Android) */
      font-weight: 800 !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-smooth: always;
      -webkit-text-stroke: 0.3px rgba(255,255,255,0.1);
    }
    
    .wrap {
      height: var(--vh);
      height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      position: relative;
      z-index: 10;
    }
    
    .card {
      width: min(520px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .header, .top, .tool-header {
      padding-top: 12px !important;
    }

    /* Убираем размытие с кнопок */
    .btn, .tools-btn, .tool-item, .langPill, .themePill, .platformPill {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      font-weight: 800 !important; /* Максимально жирные */
      border: 1px solid rgba(255, 255, 255, 0.35) !important; /* Узкая обводка для всех тем */
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      letter-spacing: 0.3px;
    }

    /* ЧЕРНАЯ ТЕМА - такая же обводка как у синей */
    :root[data-theme="black"] .btn,
    :root[data-theme="black"] .tools-btn,
    :root[data-theme="black"] .tool-item,
    :root[data-theme="black"] .langPill,
    :root[data-theme="black"] .themePill,
    :root[data-theme="black"] .platformPill {
      border: 1px solid rgba(255, 255, 255, 0.35) !important; /* Такая же как у синей */
    }

    /* СИНЯЯ ТЕМА - стандартная обводка */
    :root[data-theme="blue"] .btn,
    :root[data-theme="blue"] .tools-btn,
    :root[data-theme="blue"] .tool-item,
    :root[data-theme="blue"] .langPill,
    :root[data-theme="blue"] .themePill,
    :root[data-theme="blue"] .platformPill {
      border: 1px solid rgba(255, 255, 255, 0.35) !important;
    }

    /* СВЕТЛАЯ ТЕМА - темная обводка */
    :root[data-theme="light"] .btn,
    :root[data-theme="light"] .tools-btn,
    :root[data-theme="light"] .tool-item,
    :root[data-theme="light"] .langPill,
    :root[data-theme="light"] .themePill,
    :root[data-theme="light"] .platformPill {
      border: 1px solid rgba(0, 0, 0, 0.3) !important;
      color: #1a2634 !important;
    }

    /* ДЛЯ ANDROID - чуть ярче */
    html.android-mode[data-theme="blue"] {
      filter: brightness(1.08);
    }
    
    html.android-mode[data-theme="black"] {
      filter: brightness(1.1);
    }

    /* Текст максимально четкий для всех элементов */
    body, .sub, .ver, .langTitle, .platformTitle, 
    .btn, .tools-btn, .tool-text, .langPill span, .themePill span, .platformPill span,
    .title, .gear, a, button, span, div {
      font-weight: 800 !important;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2) !important;
      letter-spacing: 0.3px !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
  </style>

  <link rel="stylesheet" href="./css/base.css?v=3">
  <link rel="stylesheet" href="./css/index.css?v=6">
  <link rel="stylesheet" href="./css/tools.css?v=1">
</head>

<body>

  <div class="cube small f5" style="left:45%; top:18%"></div>
  <div class="cube tiny f6" style="left:55%; top:65%"></div>
  <div class="cube f1" style="left:65%; top:30%"></div>
  <div class="cube small f2" style="left:75%; top:55%"></div>
  <div class="cube tiny f3" style="left:85%; top:15%"></div>
  <div class="cube f4" style="left:92%; top:75%"></div>
  
  <div class="cube f5" style="left:8%; top:70%"></div>
  <div class="cube small f6" style="left:18%; top:85%"></div>
  <div class="cube tiny f1" style="left:28%; top:50%"></div>
  <div class="cube f2" style="left:38%; top:92%"></div>
  <div class="cube small f3" style="left:48%; top:5%"></div>
  <div class="cube tiny f4" style="left:58%; top:45%"></div>
  <div class="cube f5" style="left:68%; top:88%"></div>
  <div class="cube small f6" style="left:78%; top:72%"></div>
  <div class="cube tiny f1" style="left:88%; top:35%"></div>
  <div class="cube f2" style="left:95%; top:60%"></div>

  <div class="wrap">
    <div class="card">
      <!-- ОБЫЧНЫЕ КНОПКИ -->
      <button class="btn" id="chatBtn" onclick="openPage('chat.html')">💬 Чат с ИИ</button>
      <button class="btn" id="imgBtn" onclick="openPage('image.html')">🎨 Генерация картинки</button>
      
      <!-- КНОПКА ИНСТРУМЕНТОВ -->
      <div class="tools-container">
        <button class="btn tools-btn" id="toolsBtn" type="button">
          <span id="toolsBtnText">🔧 Инструменты</span> <span class="chev" id="toolsChev">▼</span>
        </button>
        
        <div class="tools-dropdown" id="toolsDropdown">
          <div class="tool-item" onclick="openTool('remove-bg.html')">

            <span class="tool-text" id="toolRemoveBgText">Удаление фона</span>
            <span class="tool-arrow">▶</span>
          </div>
          <div class="tool-item" onclick="openTool('text-from-image.html')">

            <span class="tool-arrow">▶</span>

          <div class="tool-item" onclick="openTool('selfie-filters.html')">
            <span class="tool-icon">🤳</span>

          <div class="tool-item" onclick="openTool('music.html')">

          <div class="tool-item" onclick="openTool('meme.html')">
            <span class="tool-icon">📝</span>

            <span class="tool-arrow">▶</span>
          </div>
          <div class="tool-item" onclick="openTool('qr.html')">
            <span class="tool-icon">📱</span>
            <span class="tool-text" id="toolQrText">QR коды</span>
            <span class="tool-arrow">▶</span>
          </div>
        </div>
      </div>

      <div class="sub" id="subText">Быстрые ответы • Память • Заметки</div>
      <div class="ver" id="verText">miniapp v3</div>

      <!-- БЛОК ЯЗЫКА -->
      <div class="langBlock">
        <div class="langTitle" id="langTitle">Язык интерфейса</div>
        <button class="langPill" id="langBtn" type="button">
          <span id="langBtnText">Русский (RU)</span> <span class="chev">▾</span>
        </button>
      </div>

      <!-- БЛОК ПЛАТФОРМЫ (iOS/Android) -->
      <div class="platformBlock">
        <div class="platformTitle" id="platformTitle">Режим</div>
        <button class="platformPill" id="platformBtn" type="button">

  <!-- Оверлей языков -->
  <div class="langOverlay" id="langOverlay">
    <div class="langSheet">
      <div class="langSheetHeader">
        <div class="langSheetTitle" id="langSheetTitle">Язык</div>

  </div>

  <!-- Оверлей темы -->
  <div class="themeOverlay" id="themeOverlay">

      <div class="themeSheetHeader">

      </div>
      <div class="themeList" id="themeList"></div>
    </div>
  </div>

  <!-- Оверлей платформы (iOS/Android) -->
  <div class="platformOverlay" id="platformOverlay">
    <div class="platformSheet">
      <div class="platformSheetHeader">
        <div class="platformSheetTitle" id="platformSheetTitle">Режим</div>
        <button class="platformClose" id="platformClose" type="button">✕</button>
      </div>
      <div class="platformList" id="platformList"></div>
    </div>
  </div>

  <script>
    // Функция открытия страниц внутри Telegram
    function openPage(page) {
      const tg = window.Telegram?.WebApp;
      const lang = getSavedLang();
      const theme = getSavedTheme();
      const platform = getSavedPlatform();
      
      const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
      const fullUrl = `${baseUrl}${page}?lang=${encodeURIComponent(lang)}&theme=${encodeURIComponent(theme)}&platform=${encodeURIComponent(platform)}`;
      
      window.location.href = fullUrl;
    }

    // Функция открытия инструментов
    function openTool(toolPage) {
      const tg = window.Telegram?.WebApp;
      const lang = getSavedLang();
      const theme = getSavedTheme();
      const platform = getSavedPlatform();
      
      const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
      const fullUrl = `${baseUrl}tools/${toolPage}?lang=${encodeURIComponent(lang)}&theme=${encodeURIComponent(theme)}&platform=${encodeURIComponent(platform)}`;
      
      window.location.href = fullUrl;
    }

    // Получение сохраненного языка
    function getSavedLang() {
      try { return localStorage.getItem("miniapp_lang_v1") || "ru"; } 
      catch(e) { return "ru"; }
    }

    // Получение сохраненной темы
    function getSavedTheme() {
      try { return localStorage.getItem("miniapp_theme_v1") || "blue"; } 
      catch(e) { return "blue"; }
    }

    // Получение сохраненной платформы (iOS/Android)
    function getSavedPlatform() {
      try { return localStorage.getItem("miniapp_platform_v1") || "ios"; } 
      catch(e) { return "ios"; }
    }

    // Инициализация выпадающего меню
    (function() {
      const toolsBtn = document.getElementById('toolsBtn');
      const toolsDropdown = document.getElementById('toolsDropdown');
      const toolsChev = document.getElementById('toolsChev');
      
      if (!toolsBtn || !toolsDropdown) return;
      
      let isOpen = false;
      try {
        isOpen = localStorage.getItem('tools_menu_open') === 'true';
      } catch(e) {}
      
      function toggleTools(e) {
        e.preventDefault();
        e.stopPropagation();
        
        isOpen = !isOpen;
        
        if (isOpen) {
          toolsDropdown.classList.add('open');
          toolsBtn.classList.add('active');
          toolsChev.classList.add('rotate');
          toolsChev.textContent = '▲';
        } else {
          toolsDropdown.classList.remove('open');
          toolsBtn.classList.remove('active');
          toolsChev.classList.remove('rotate');
          toolsChev.textContent = '▼';
        }
        
        try {
          localStorage.setItem('tools_menu_open', isOpen);
        } catch(e) {}
      }
      
      toolsBtn.addEventListener('click', toggleTools);
      
      document.addEventListener('click', (e) => {
        if (isOpen && !toolsBtn.contains(e.target) && !toolsDropdown.contains(e.target)) {
          toggleTools(e);
        }
      });
      
      if (isOpen) {
        toolsDropdown.classList.add('open');
        toolsBtn.classList.add('active');
        toolsChev.textContent = '▲';
      }
    })();

    // ===== ДОБАВЛЕН ПЕРЕВОД ДЛЯ "РЕЖИМ" =====
    const I18N = {
      ru: { platform: "Режим" },
      kk: { platform: "Режим" },
      en: { platform: "Mode" },
      tr: { platform: "Mod" },
      uk: { platform: "Режим" },
      fr: { platform: "Mode" }
    };

    function updatePlatformTitle() {
      const lang = getSavedLang();
      const t = I18N[lang] || I18N.ru;
      const platformTitle = document.getElementById('platformTitle');
      if (platformTitle) {
        platformTitle.textContent = t.platform;
      }
    }

    // Обновляем при загрузке и при смене языка
    document.addEventListener('DOMContentLoaded', updatePlatformTitle);
    window.addEventListener('languageChanged', updatePlatformTitle);
  </script>

  <!-- Подключаем index.js -->
  <script type="module" src="./js/index.js?v=7"></script>
</body>
</html>
